<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="12" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="56" rx="12" fill="#0f172a"/>
  <rect x="0" y="40" width="800" height="16" fill="#0f172a"/>
  <text x="24" y="34" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">🎙️ AI Front Desk Settings</text>
  <text x="260" y="34" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">Voice &amp; Email Intake Configuration</text>

  <!-- === VOICE PANEL === -->
  <g transform="translate(24, 80)">
    <rect x="0" y="0" width="360" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="360" height="40" rx="12" fill="#0f172a"/>
    <rect x="0" y="24" width="360" height="16" fill="#0f172a"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">🧑‍💼 Voice Agent</text>
    <rect x="270" y="10" width="75" height="22" rx="11" fill="#16a34a" opacity="0.15"/>
    <text x="307" y="21" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a" text-anchor="middle">Active ✓</text>

    <!-- Voice selector -->
    <g transform="translate(16, 56)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">AI Voice Profile</text>
      <!-- Voice cards -->
      <rect x="0" y="12" width="80" height="60" rx="8" fill="#2563eb" opacity="0.2" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="40" cy="28" r="12" fill="#2563eb"/>
      <text x="40" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#fff" text-anchor="middle" dominant-baseline="central">▶</text>
      <text x="40" y="50" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#e2e8f0" text-anchor="middle">Sarah</text>
      <text x="40" y="62" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Warm</text>

      <rect x="90" y="12" width="80" height="60" rx="8" fill="#ffffff" opacity="0.04"/>
      <circle cx="130" cy="28" r="12" fill="#ffffff" opacity="0.1"/>
      <text x="130" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">▶</text>
      <text x="130" y="50" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#cbd5e1" text-anchor="middle">James</text>
      <text x="130" y="62" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Authoritative</text>

      <rect x="180" y="12" width="80" height="60" rx="8" fill="#ffffff" opacity="0.04"/>
      <circle cx="220" cy="28" r="12" fill="#ffffff" opacity="0.1"/>
      <text x="220" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">▶</text>
      <text x="220" y="50" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#cbd5e1" text-anchor="middle">Elena</text>
      <text x="220" y="62" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Spanish</text>
    </g>

    <!-- After-hours -->
    <g transform="translate(16, 140)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">After-Hours Action</text>
      <rect x="0" y="12" width="200" height="28" rx="6" fill="#ffffff" opacity="0.06"/>
      <text x="12" y="30" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94a3b8">Forward to answering service</text>
      <rect x="210" y="12" width="130" height="28" rx="6" fill="#ffffff" opacity="0.06"/>
      <text x="222" y="30" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94a3b8">Via Smith.ai →</text>

      <!-- Integration status -->
      <rect x="0" y="56" width="328" height="36" rx="8" fill="#16a34a" opacity="0.08"/>
      <circle cx="20" cy="74" r="5" fill="#16a34a"/>
      <text x="34" y="78" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#16a34a">Connected to Vapi.ai</text>
      <text x="160" y="78" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Latency: ~450ms</text>
    </g>
  </g>

  <!-- === EMAIL PANEL === -->
  <g transform="translate(408, 80)">
    <rect x="0" y="0" width="360" height="260" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="360" height="40" rx="12" fill="#0f172a"/>
    <rect x="0" y="24" width="360" height="16" fill="#0f172a"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">📧 Email Intake</text>
    <rect x="270" y="10" width="75" height="22" rx="11" fill="#16a34a" opacity="0.15"/>
    <text x="307" y="21" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a" text-anchor="middle">Active ✓</text>

    <g transform="translate(16, 56)">
      <!-- Inbound address -->
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#94a3b8">Inbound Email Address</text>
      <rect x="0" y="12" width="328" height="32" rx="8" fill="#ffffff" opacity="0.06"/>
      <text x="16" y="32" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#60a5fa">intake@yourfirm.lexiflow.co</text>
      <rect x="260" y="14" width="56" height="28" rx="6" fill="#ffffff" opacity="0.08"/>
      <text x="288" y="32" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Copy</text>

      <!-- Template preview -->
      <rect x="0" y="56" width="328" height="100" rx="8" fill="#ffffff" opacity="0.04"/>
      <text x="16" y="58" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#64748b">Auto-Reply Template</text>
      <text x="16" y="80" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Thank you for contacting {{firm_name}}.</text>
      <text x="16" y="96" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">We received your inquiry regarding</text>
      <text x="16" y="112" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">{{case_type}}. Your tracking ID: {{id}}.</text>

      <!-- Variables chips -->
      <g transform="translate(0, 168)">
        <rect x="0" y="0" width="80" height="22" rx="6" fill="#2563eb" opacity="0.15"/>
        <text x="8" y="14" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#60a5fa">{{name}}</text>
        <rect x="88" y="0" width="80" height="22" rx="6" fill="#2563eb" opacity="0.15"/>
        <text x="96" y="14" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#60a5fa">{{email}}</text>
        <rect x="176" y="0" width="70" height="22" rx="6" fill="#2563eb" opacity="0.15"/>
        <text x="184" y="14" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#60a5fa">{{firm}}</text>
      </g>
    </g>
  </g>

  <!-- === STATS BAR (Bottom) === -->
  <g transform="translate(24, 370)">
    <rect x="0" y="0" width="744" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="372" y="24" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="middle">AI Front Desk Activity (This Week)</text>

    <!-- Stat items -->
    <g transform="translate(40, 44)">
      <rect x="0" y="0" width="140" height="40" rx="8" fill="#2563eb" opacity="0.1"/>
      <text x="70" y="18" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">247</text>
      <text x="70" y="34" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Voice Calls</text>
    </g>
    <g transform="translate(200, 44)">
      <rect x="0" y="0" width="140" height="40" rx="8" fill="#16a34a" opacity="0.1"/>
      <text x="70" y="18" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="#16a34a" text-anchor="middle">183</text>
      <text x="70" y="34" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Emails</text>
    </g>
    <g transform="translate(360, 44)">
      <rect x="0" y="0" width="140" height="40" rx="8" fill="#d97706" opacity="0.1"/>
      <text x="70" y="18" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="#fbbf24" text-anchor="middle">412</text>
      <text x="70" y="34" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Web Intakes</text>
    </g>
    <g transform="translate(520, 44)">
      <rect x="0" y="0" width="180" height="40" rx="8" fill="#2563eb" opacity="0.1"/>
      <text x="90" y="18" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="#60a5fa" text-anchor="middle">68%</text>
      <text x="90" y="34" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Qualification Rate</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(24, 500)">
    <rect x="0" y="0" width="744" height="60" rx="8" fill="#2563eb" opacity="0.06" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="4 4"/>
    <text x="16" y="22" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#60a5fa">💡 Fully configurable — choose voice profile, set active hours, customize email templates,</text>
    <text x="16" y="42" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#60a5fa">and route calls based on urgency. Powered by Vapi.ai + Postmark + Deepgram.</text>
  </g>
</svg>