<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600">
  <rect width="800" height="600" fill="#f8fafc"/>
  <rect x="40" y="40" width="720" height="520" rx="16" fill="#fff" stroke="#e2e8f0"/>
  <rect x="40" y="40" width="720" height="60" rx="16" fill="#1a3a5c"/>
  <text x="80" y="78" font-family="Inter" font-size="16" font-weight="700" fill="#c9a84c">AI Intake Agent Live Demo</text>
  <circle cx="660" cy="74" r="5" fill="#16a34a"/>
  <text x="675" y="78" font-family="Inter" font-size="11" fill="rgba(255,255,255,0.7)">Active</text>
  <circle cx="60" cy="140" r="18" fill="#1a3a5c"/><text x="50" y="146" font-family="Inter" font-size="10" font-weight="700" fill="#c9a84c">AI</text>
  <rect x="90" y="120" width="350" height="50" rx="10" fill="#f8fafc"/>
  <text x="105" y="142" font-family="Inter" font-size="13" fill="#1a3a5c">Hello! Im Lexi your AI intake assistant.</text>
  <text x="105" y="160" font-family="Inter" font-size="11" fill="#6b7280">Tell me about your potential case.</text>
  <rect x="380" y="200" width="320" height="40" rx="10" fill="rgba(201,168,76,0.1)"/>
  <text x="400" y="225" font-family="Inter" font-size="13" fill="#1a3a5c">I was in a car accident last week.</text>
  <rect x="700" y="200" width="36" height="36" rx="18" fill="#c9a84c"/><text x="705" y="225" font-family="Inter" font-size="11" font-weight="700" fill="#fff">You</text>
  <circle cx="60" cy="280" r="18" fill="#1a3a5c"/><text x="50" y="286" font-family="Inter" font-size="10" font-weight="700" fill="#c9a84c">AI</text>
  <rect x="90" y="260" width="380" height="50" rx="10" fill="#f8fafc"/>
  <text x="105" y="282" font-family="Inter" font-size="13" fill="#1a3a5c">Im sorry to hear that. Let me ask a few</text>
  <text x="105" y="302" font-family="Inter" font-size="13" fill="#1a3a5c">questions to evaluate your potential case.</text>
  <rect x="90" y="360" width="620" height="30" rx="15" fill="#e2e8f0"/>
  <rect x="90" y="360" width="420" height="30" rx="15" fill="#c9a84c"/>
  <text x="300" y="380" text-anchor="middle" font-family="Inter" font-size="12" font-weight="700" fill="#0d1f33">82/100 High Priority Case</text>
  <text x="100" y="430" font-family="Inter" font-size="14" font-weight="700" fill="#1a3a5c">Quick Actions</text>
  <rect x="100" y="445" width="140" height="36" rx="8" fill="#1a3a5c"/><text x="170" y="468" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="#fff">Car Accident</text>
  <rect x="260" y="445" width="140" height="36" rx="8" fill="#1a3a5c"/><text x="330" y="468" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="#fff">Slip and Fall</text>
  <rect x="420" y="445" width="140" height="36" rx="8" fill="#1a3a5c"/><text x="490" y="468" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="#fff">Med Mal</text>
  <rect x="100" y="505" width="250" height="40" rx="8" fill="#c9a84c"/><text x="225" y="530" text-anchor="middle" font-family="Inter" font-size="13" font-weight="700" fill="#0d1f33">Send to Attorney Review</text>
</svg>