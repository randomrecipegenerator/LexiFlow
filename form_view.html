<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiFlow Intake Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header / Branding -->
        <div id="form-header" class="p-8 text-center border-b border-slate-100">
            <div id="form-logo-container" class="mb-4 hidden">
                <img id="form-logo" src="" alt="Firm Logo" class="h-12 mx-auto">
            </div>
            <h1 id="form-name" class="text-3xl font-bold text-slate-900">Loading Form...</h1>
            <p class="text-slate-500 mt-2">Please answer the questions below to begin your intake.</p>
        </div>

        <!-- Form Body -->
        <div class="p-8">
            <div id="questions-list" class="space-y-8">
                <!-- Questions will be rendered here -->
            </div>

            <!-- Submit Button -->
            <div class="mt-12">
                <button id="submit-btn" onclick="submitForm()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center">
                    Submit Intake
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="p-6 bg-slate-50 text-center border-t border-slate-100">
            <p class="text-slate-400 text-sm flex items-center justify-center">
                <img src="branding/logo-icon.svg" alt="LexiFlow" class="h-4 mr-2 grayscale opacity-50">
                Powered by LexiFlow Secure AI Intake
            </p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="bi bi-check-lg text-4xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Intake Submitted</h2>
            <p class="text-slate-500 mb-8">Thank you for your information. An attorney will review your case and contact you shortly.</p>
            <button onclick="window.close()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold">Close Window</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const formId = urlParams.get('id');
        let formData = null;
        let answers = {};

        async function init() {
            if (!formId) {
                document.getElementById('form-name').innerText = "Form Not Found";
                return;
            }

            try {
                const response = await apiFetch(`/forms/${formId}`);
                formData = await response.json();
                renderForm();
            } catch (e) {
                console.error("Failed to load form", e);
                document.getElementById('form-name').innerText = "Error Loading Form";
            }
        }

        function renderForm() {
            document.title = formData.name + " | LexiFlow";
            document.getElementById('form-name').innerText = formData.name;
            
            if (formData.branding_logo) {
                document.getElementById('form-logo').src = formData.branding_logo;
                document.getElementById('form-logo-container').classList.remove('hidden');
            }

            if (formData.branding_colors) {
                const btn = document.getElementById('submit-btn');
                btn.style.backgroundColor = formData.branding_colors;
            }

            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-list');
            container.innerHTML = '';

            formData.questions.forEach(q => {
                // Check reactive logic
                if (q.logic) {
                    const dependentAnswer = answers[q.logic.dependsOn];
                    if (dependentAnswer !== q.logic.value) {
                        return; // Hide this question
                    }
                }

                const qDiv = document.createElement('div');
                qDiv.className = 'question-item animate-in fade-in slide-in-from-bottom-4 duration-500';
                
                let inputHtml = '';
                if (q.type === 'text') {
                    inputHtml = `<input type="text" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                        placeholder="Your answer" onchange="setAnswer(${q.id}, this.value)">`;
                } else if (q.type === 'date') {
                    inputHtml = `<input type="date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                        onchange="setAnswer(${q.id}, this.value)">`;
                } else if (q.type === 'yes_no') {
                    inputHtml = `
                        <div class="flex gap-4">
                            <button onclick="setAnswer(${q.id}, 'Yes')" class="flex-1 p-4 rounded-xl border-2 transition ${answers[q.id] === 'Yes' ? 'bg-blue-50 border-blue-600 text-blue-600' : 'bg-white border-slate-200 text-slate-600 hover:border-blue-300'}">Yes</button>
                            <button onclick="setAnswer(${q.id}, 'No')" class="flex-1 p-4 rounded-xl border-2 transition ${answers[q.id] === 'No' ? 'bg-blue-50 border-blue-600 text-blue-600' : 'bg-white border-slate-200 text-slate-600 hover:border-blue-300'}">No</button>
                        </div>
                    `;
                }

                qDiv.innerHTML = `
                    <label class="block text-lg font-semibold text-slate-800 mb-3">${q.text}</label>
                    ${inputHtml}
                `;
                container.appendChild(qDiv);
            });
        }

        function setAnswer(id, val) {
            answers[id] = val;
            // Re-render to handle reactive logic
            renderQuestions();
        }

        async function submitForm() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-arrow-repeat animate-spin mr-2"></i> Submitting...';

            // Extract Name if present for the lead record
            // Look for keywords in question text
            let leadName = "Form Lead";
            for (const qId in answers) {
                const q = formData.questions.find(fq => fq.id == qId);
                if (q && (q.text.toLowerCase().includes('name') || q.text.toLowerCase().includes('full name'))) {
                    leadName = answers[qId];
                    break;
                }
            }

            const finalAnswers = { ...answers, name: leadName };

            const fd = new FormData();
            fd.append('answers_json', JSON.stringify(finalAnswers));

            try {
                const response = await apiFetch(`/forms/${formId}/submit`, {
                    method: 'POST',
                    body: fd
                });
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('success-modal').classList.remove('hidden');
                } else {
                    alert("Submission failed. Please try again.");
                }
            } catch (e) {
                console.error("Submit error", e);
                alert("Network error.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Submit Intake';
            }
        }

        init();
    </script>
</body>
</html>
