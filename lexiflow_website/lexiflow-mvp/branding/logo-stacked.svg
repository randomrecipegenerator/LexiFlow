<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon (centered above wordmark) -->
  <g transform="translate(40, 10)">
    <!-- Background -->
    <rect x="2" y="2" width="116" height="100" rx="20" fill="url(#primaryGrad)" opacity="0.06"/>

    <!-- Scale beam -->
    <line x1="15" y1="52" x2="105" y2="52" stroke="url(#primaryGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Fulcrum -->
    <polygon points="55,70 65,70 60,52" fill="url(#primaryGrad)" opacity="0.95"/>

    <!-- Left pan -->
    <path d="M15 52 Q10 64 5 67 Q15 70 25 67 Q20 64 15 52Z" fill="url(#primaryGrad)" opacity="0.9"/>

    <!-- Right pan (flowing upward) -->
    <path d="M105 52 Q110 42 115 40 Q105 37 95 40 Q100 42 105 52Z" fill="url(#primaryGrad)" opacity="0.9"/>

    <!-- Data dots -->
    <circle cx="100" cy="43" r="2.5" fill="#818cf8" opacity="0.85"/>
    <circle cx="107" cy="40" r="3" fill="#818cf8" opacity="0.6"/>
    <circle cx="113" cy="42" r="2" fill="#818cf8" opacity="0.4"/>
  </g>

  <!-- Wordmark stacked -->
  <text x="100" y="138" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="#1e293b" letter-spacing="-1" text-anchor="middle" dominant-baseline="central">Lexi</text>
  <text x="100" y="168" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="36" font-weight="700" fill="url(#primaryGrad)" letter-spacing="-1" text-anchor="middle" dominant-baseline="central">Flow</text>
</svg>