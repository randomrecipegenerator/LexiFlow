<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Lens icon: Magnifying glass over deposition transcript lines -->
  <g transform="translate(10, 10)">
    <!-- Lens outer ring -->
    <circle cx="40" cy="40" r="30" fill="none" stroke="url(#primaryGrad)" stroke-width="4" opacity="0.15"/>
    <circle cx="40" cy="40" r="26" fill="none" stroke="url(#primaryGrad)" stroke-width="3.5"/>
    <!-- Lens glass -->
    <circle cx="40" cy="40" r="24" fill="url(#primaryGrad)" opacity="0.08"/>
    <!-- Deposition text lines inside lens -->
    <line x1="28" y1="32" x2="52" y2="32" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="40" x2="50" y2="40" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="48" x2="52" y2="48" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Highlight/conflict mark (amber) -->
    <circle cx="44" cy="36" r="3" fill="#d97706"/>
    <circle cx="36" cy="44" r="2.5" fill="#d97706"/>
    <!-- Handle -->
    <line x1="60" y1="60" x2="78" y2="78" stroke="url(#primaryGrad)" stroke-width="5" stroke-linecap="round"/>
    <line x1="62" y1="62" x2="76" y2="76" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <g transform="translate(100, 0)">
    <text x="0" y="68" font-family="'Inter', system-ui, sans-serif" font-size="40" font-weight="700" fill="#1e3a5f" letter-spacing="-1" dominant-baseline="central">Depo</text>
    <text x="110" y="68" font-family="'Inter', system-ui, sans-serif" font-size="40" font-weight="700" fill="url(#accentGrad)" letter-spacing="-1" dominant-baseline="central">Lens</text>
    <!-- Tagline -->
    <text x="2" y="98" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#64748b" letter-spacing="2">AI DEPOSITION CONFLICT DETECTOR</text>
  </g>
</svg>