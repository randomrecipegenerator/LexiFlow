    <text x="100" y="218" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">AVAILABLE ON CTO.NEW</text>

    <!-- Headline -->
    <text x="0" y="300" font-family="'Inter', system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">The AI Front Desk</text>
