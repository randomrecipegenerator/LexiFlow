<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="180" x2="1920" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1920" y2="360" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1920" y2="540" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="720" x2="1920" y2="720" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="900" x2="1920" y2="900" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="1080" stroke="#fff" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="1080" stroke="#fff" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#fff" stroke-width="0.5"/>
    <line x1="1280" y1="0" x2="1280" y2="1080" stroke="#fff" stroke-width="0.5"/>
