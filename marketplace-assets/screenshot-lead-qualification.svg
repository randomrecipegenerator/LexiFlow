<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="12" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="56" rx="12" fill="#0f172a"/>
  <rect x="0" y="40" width="800" height="16" fill="#0f172a"/>
  <text x="24" y="34" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">📊 Lead Analytics</text>
  <text x="240" y="34" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">AI-Powered Qualification Dashboard</text>

  <!-- === DONUT CHART (Left) === -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="340" height="480" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="170" y="30" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Lead Source Breakdown</text>

    <!-- Donut segments -->
    <circle cx="170" cy="200" r="100" fill="none" stroke="#2563eb" stroke-width="35" stroke-dasharray="250 160"/>
    <circle cx="170" cy="200" r="100" fill="none" stroke="#16a34a" stroke-width="35" stroke-dasharray="120 290" stroke-dashoffset="-130"/>
    <circle cx="170" cy="200" r="100" fill="none" stroke="#d97706" stroke-width="35" stroke-dasharray="55 355" stroke-dashoffset="-250"/>
    <circle cx="170" cy="200" r="75" fill="#1e293b"/>
    <text x="170" y="195" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#e2e8f0" text-anchor="middle">842</text>
    <text x="170" y="218" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="middle">total leads</text>

    <!-- Legend -->
    <g transform="translate(60, 330)">
      <rect x="0" y="0" width="16" height="16" rx="4" fill="#2563eb"/>
      <text x="24" y="12" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#94a3b8">Web Widget</text>
      <text x="200" y="12" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="end">412</text>
      <text x="230" y="12" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="end">54%</text>

      <rect x="0" y="32" width="16" height="16" rx="4" fill="#16a34a"/>
      <text x="24" y="44" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#94a3b8">Voice Call</text>
      <text x="200" y="44" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="end">247</text>
      <text x="230" y="44" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="end">32%</text>

      <rect x="0" y="64" width="16" height="16" rx="4" fill="#d97706"/>
      <text x="24" y="76" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#94a3b8">Email Intake</text>
      <text x="200" y="76" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0" text-anchor="end">105</text>
      <text x="230" y="76" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b" text-anchor="end">14%</text>
    </g>
  </g>

  <!-- === QUALIFICATION TABLE (Right) === -->
  <g transform="translate(410, 80)">
    <rect x="0" y="0" width="350" height="480" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="175" y="30" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Lead Qualification Scores</text>

    <!-- Score bar visualization -->
    <g transform="translate(16, 60)">
      <!-- Lead 1 -->
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Maria G.</text>
      <rect x="0" y="10" width="280" height="20" rx="4" fill="#ffffff" opacity="0.06"/>
      <rect x="0" y="10" width="240" height="20" rx="4" fill="#16a34a"/>
      <text x="290" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">82</text>
      <text x="310" y="24" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">✓ Qualif.</text>

      <!-- Lead 2 -->
      <text x="0" y="45" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">James T.</text>
      <rect x="0" y="55" width="280" height="20" rx="4" fill="#ffffff" opacity="0.06"/>
      <rect x="0" y="55" width="270" height="20" rx="4" fill="#16a34a"/>
      <text x="290" y="69" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a">91</text>
      <text x="310" y="69" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#16a34a">★ Urgent</text>

      <!-- Lead 3 -->
      <text x="0" y="90" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Robert K.</text>
      <rect x="0" y="100" width="280" height="20" rx="4" fill="#ffffff" opacity="0.06"/>
      <rect x="0" y="100" width="185" height="20" rx="4" fill="#fbbf24"/>
      <text x="290" y="114" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">63</text>
      <text x="310" y="114" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#d97706">Review</text>

      <!-- Lead 4 -->
      <text x="0" y="135" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">Sarah L.</text>
      <rect x="0" y="145" width="280" height="20" rx="4" fill="#ffffff" opacity="0.06"/>
      <rect x="0" y="145" width="160" height="20" rx="4" fill="#fbbf24"/>
      <text x="290" y="159" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#fbbf24">55</text>
      <text x="310" y="159" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#d97706">Review</text>

      <!-- Lead 5 -->
      <text x="0" y="180" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#cbd5e1">David M.</text>
      <rect x="0" y="190" width="280" height="20" rx="4" fill="#ffffff" opacity="0.06"/>
      <rect x="0" y="190" width="50" height="20" rx="4" fill="#ef4444"/>
      <text x="290" y="204" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444">17</text>
      <text x="310" y="204" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#ef4444">✗ Low</text>
    </g>

    <!-- Annotation callout -->
    <g transform="translate(16, 340)">
      <rect x="0" y="0" width="318" height="60" rx="8" fill="#2563eb" opacity="0.1" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="4 4"/>
      <text x="16" y="22" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#60a5fa">💡 Scoring: 0-100 based on case merit,</text>
      <text x="16" y="42" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#60a5fa">jurisdiction, injury severity, and liability.</text>
    </g>
  </g>
</svg>