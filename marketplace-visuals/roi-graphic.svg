<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>
  <circle cx="650" cy="100" r="180" fill="#2563eb" opacity="0.04"/>
  <circle cx="150" cy="400" r="120" fill="#6366f1" opacity="0.03"/>

  <g transform="translate(40, 40)">
    <text x="0" y="20" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="800" fill="#e2e8f0">📉 The Intake Efficiency Gap</text>
    <text x="0" y="46" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748b">Manual intake vs. LexiFlow Technologies Inc automated intake</text>

    <!-- BEFORE -->
    <g transform="translate(0, 80)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#ef4444">⬤ Without LexiFlow</text>
      <rect x="0" y="14" width="320" height="28" rx="6" fill="#dc2626" opacity="0.12"/>
      <rect x="0" y="14" width="320" height="28" rx="6" fill="#ef4444"/>
      <text x="340" y="32" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#ef4444" dominant-baseline="central">80+ hrs/week</text>
    </g>

    <!-- AFTER -->
    <g transform="translate(0, 130)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#16a34a">⬤ With LexiFlow Technologies Inc</text>
      <rect x="0" y="14" width="320" height="28" rx="6" fill="#16a34a" opacity="0.12"/>
      <rect x="0" y="14" width="160" height="28" rx="6" fill="#16a34a"/>
      <text x="340" y="32" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#16a34a" dominant-baseline="central">40 hrs/week</text>
    </g>

    <!-- Savings callout -->
    <g transform="translate(480, 60)">
      <rect x="0" y="0" width="240" height="100" rx="12" fill="#2563eb" opacity="0.08" stroke="#2563eb" stroke-width="1" stroke-dasharray="5 3"/>
      <text x="120" y="30" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#60a5fa" text-anchor="middle">50%</text>
      <text x="120" y="54" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Reduction in</text>
      <text x="120" y="74" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Paralegal Intake Time</text>
    </g>
  </g>

  <!-- Bottom: Annual savings -->
  <g transform="translate(40, 220)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="#334155" stroke-width="1"/>
    <text x="360" y="30" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0" text-anchor="middle">Annual Impact at $75/hr Paralegal Rate</text>

    <!-- Cost cards -->
    <g transform="translate(60, 50)">
      <rect x="0" y="0" width="260" height="80" rx="10" fill="#dc2626" opacity="0.08"/>
      <text x="130" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#fca5a5" text-anchor="middle">Manual Intake Cost</text>
      <text x="130" y="50" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="800" fill="#ef4444" text-anchor="middle">$156,000/yr</text>
    </g>

    <g transform="translate(340, 50)">
      <text x="40" y="40" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="700" fill="#64748b">→</text>
    </g>

    <g transform="translate(400, 50)">
      <rect x="0" y="0" width="260" height="80" rx="10" fill="#16a34a" opacity="0.08"/>
      <text x="130" y="22" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#86efac" text-anchor="middle">With LexiFlow Technologies Inc</text>
      <text x="130" y="50" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="800" fill="#16a34a" text-anchor="middle">$78,000/yr</text>
    </g>
  </g>

  <!-- Bottom: You save -->
  <g transform="translate(40, 380)">
    <rect x="0" y="0" width="720" height="80" rx="12" fill="url(#accent)" opacity="0.1"/>
    <rect x="0" y="0" width="720" height="80" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="360" y="32" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="800" fill="#60a5fa" text-anchor="middle">You Save: $78,000 / year</text>
    <text x="360" y="54" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="middle">Plus recapture lost revenue from missed leads &amp; faster case conversions</text>
  </g>
</svg>