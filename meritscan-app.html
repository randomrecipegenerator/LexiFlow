<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeritScan — AI Medical Record Analysis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fas fa-stethoscope text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">MeritScan</h1>
            </div>
            <nav class="flex items-center space-x-6">
                <a href="/meritscan.html" class="text-gray-600 hover:text-blue-600 font-medium">Landing Page</a>
                <button id="upload-btn" class="bg-blue-600 text-white hover:bg-blue-700 px-6 py-2 rounded-full font-semibold transition shadow-md">
                    <i class="fas fa-upload mr-2"></i>New Record
                </button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Upload Modal -->
        <div id="upload-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full">
                <h2 class="text-2xl font-bold mb-4">Upload Medical Record</h2>
                <p class="text-gray-600 mb-6">Select a PDF medical record to analyze for merit review.</p>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-10 text-center mb-6 hover:border-blue-500 transition cursor-pointer" id="drop-zone">
                    <i class="fas fa-file-medical text-4xl text-gray-400 mb-2"></i>
                    <p class="text-sm text-gray-500">Drag & drop or click to browse</p>
                    <input type="file" id="file-input" class="hidden" accept=".pdf,.txt">
                </div>
                <div id="file-info" class="mb-4 hidden">
                    <p class="text-sm font-medium" id="filename-display"></p>
                </div>
                <div class="flex justify-end space-x-4">
                    <button id="cancel-upload" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button id="confirm-upload" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 disabled:opacity-50" disabled>Start Analysis</button>
                </div>
            </div>
        </div>

        <!-- Dashboard / List -->
        <section id="record-list-section">
            <h2 class="text-2xl font-bold mb-6">Your Merit Reports</h2>
            <div id="record-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Record cards will be injected here -->
                <div class="animate-pulse bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-48"></div>
            </div>
        </section>

        <!-- Result View -->
        <section id="result-section" class="hidden">
            <button id="back-to-list" class="mb-6 text-blue-600 hover:underline"><i class="fas fa-arrow-left mr-1"></i> Back to list</button>
            
            <div class="space-y-8">
                <!-- Executive Summary -->
                <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">
                    <h3 class="text-2xl font-bold mb-4 text-blue-900 border-b pb-4">Executive Merit Summary</h3>
                    <p id="summary-text" class="text-gray-700 text-lg leading-relaxed"></p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <!-- Chronology -->
                    <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                        <h3 class="text-xl font-bold mb-4 flex items-center">
                            <i class="fas fa-clock mr-2 text-blue-600"></i>Medical Chronology
                        </h3>
                        <div id="chronology-text" class="text-gray-700 whitespace-pre-line leading-relaxed"></div>
                    </div>

                    <!-- Negligence & Standard of Care -->
                    <div class="space-y-8">
                        <div class="bg-red-50 p-6 rounded-xl shadow-md border border-red-100">
                            <h3 class="text-xl font-bold text-red-800 mb-4 flex items-center">
                                <i class="fas fa-exclamation-circle mr-2"></i>Negligence Markers
                            </h3>
                            <div id="negligence-text" class="text-red-700 whitespace-pre-line leading-relaxed font-medium"></div>
                        </div>
                        
                        <div class="bg-blue-50 p-6 rounded-xl shadow-md border border-blue-100">
                            <h3 class="text-xl font-bold text-blue-800 mb-4 flex items-center">
                                <i class="fas fa-gavel mr-2"></i>Standard of Care Analysis
                            </h3>
                            <div id="soc-text" class="text-blue-700 whitespace-pre-line leading-relaxed"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="meritscan.js"></script>
</body>
</html>
