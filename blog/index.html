<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | LexiFlow Legal Suite — AI for Law Firm Intake & Medical Review</title>
    <meta name="description" content="Expert insights on AI medical merit review, legal intake automation, deposition analysis, and legal tech for plaintiff-side law firms.">
    <link rel="canonical" href="https://lexiflow.co/blog">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Blog | LexiFlow Legal Suite">
    <meta property="og:description" content="Expert insights on AI medical merit review, legal intake automation, deposition analysis, and legal tech for plaintiff-side law firms.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <style>
        :root { 
            --primary: #1a3a5c; 
            --primary-dark: #0f1f3a; 
            --accent: #c9a84c; 
            --text: #1e293b; 
            --text-muted: #64748b; 
            --bg: #ffffff; 
            --bg-alt: #f8fafc;
            --border: #e2e8f0; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        
        header { 
            background: linear-gradient(135deg, var(--primary-dark), var(--primary)); 
            color: white; 
            padding: 60px 0; 
            text-align: center; 
        }
        header h1 { font-size: 2.5rem; margin-bottom: 12px; font-weight: 700; }
        header p { color: rgba(255,255,255,0.8); max-width: 700px; margin: 0 auto; font-size: 1.1rem; }

        .search-section {
            background: white;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .search-container {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .search-input-wrapper {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            padding-left: 40px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .filter-select {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }

        .blog-grid { 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            padding: 48px 0; 
        }
        .post-card { 
            background: white;
            border: 1px solid var(--border); 
            border-radius: 12px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s; 
            text-decoration: none;
            color: inherit;
        }
        .post-card:hover { 
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.08); 
            border-color: var(--accent); 
        }
        .post-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-alt);
        }
        .post-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .post-card .category { 
            display: inline-block; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: var(--accent); 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            letter-spacing: 0.05em;
        }
        .post-card h2 { 
            font-size: 1.25rem; 
            margin-bottom: 12px; 
            color: var(--primary);
            line-height: 1.4;
        }
        .post-card .excerpt { 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            margin-bottom: 20px; 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }
        .post-card .footer-meta { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
        .read-more {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .loading-state, .error-state, .empty-state {
            text-align: center;
            padding: 60px 0;
            grid-column: 1 / -1;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        footer { 
            background: var(--bg-alt);
            text-align: center; 
            padding: 60px 0; 
            border-top: 1px solid var(--border); 
            color: var(--text-muted); 
        }
        footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        
        @media (max-width: 640px) { 
            header h1 { font-size: 1.8rem; } 
            .blog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>LexiFlow Blog</h1>
            <p>Expert insights on AI-powered legal intake, medical merit review, and litigation strategy for modern law firms.</p>
        </div>
    </header>

    <div class="search-section">
        <div class="container search-container">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Search articles...">
            </div>
            <select id="category-filter" class="filter-select">
                <option value="all">All Categories</option>
                <option value="Medical Merit">Medical Merit</option>
                <option value="Legal Ethics & Technology">Ethics</option>
                <option value="Legal Tech & AI Innovation">Innovation</option>
                <option value="Product Launch">Product News</option>
                <option value="Medical Chronology">Medical Chronology</option>
                <option value="Deposition Analysis">Deposition Analysis</option>
                <option value="Legal Intake Automation">Intake Automation</option>
            </select>
        </div>
    </div>

    <main class="container">
        <div id="blog-grid" class="blog-grid">
            <div class="loading-state">Loading articles...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 LexiFlow Legal Suite. All rights reserved.</p>
            <p style="margin-top: 12px;">
                <a href="/">Home</a> · 
                <a href="/demo">Free Demo</a> · 
                <a href="mailto:leads@lexiflow.ai">Contact Sales</a>
            </p>
        </div>
    </footer>

    <script>
        let allArticles = [];

        async function fetchArticles() {
            const grid = document.getElementById('blog-grid');
            try {
                // Fetch articles.json
                const response = await fetch('./articles.json');
                if (!response.ok) throw new Error('Failed to load articles');
                
                const data = await response.json();
                console.log('Articles API Response:', data);
                console.log('Article Count:', data?.length);
                
                allArticles = Array.isArray(data) ? data : [];
                renderArticles(allArticles);
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<div class="error-state">Unable to load articles. Please try again later.</div>';
            }
        }

        function renderArticles(articles) {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = '';

            if (!Array.isArray(articles) || articles.length === 0) {
                grid.innerHTML = '<div class="empty-state">No articles found matching your criteria.</div>';
                return;
            }

            articles.forEach(article => {
                const card = document.createElement('a');
                card.className = 'post-card';
                card.href = `/blog/${article.slug}`; // Clean URL
                
                // Fallback for missing images
                const imageUrl = article.image || '/assets/lexiflow-logo-dark.png';
                
                card.innerHTML = `
                    <img src="${imageUrl}" alt="${article.title}" class="post-image" onerror="this.src='/assets/lexiflow-logo-dark.png'; this.style.padding='40px'; this.style.objectFit='contain';">
                    <div class="post-content">
                        <span class="category">${article.category}</span>
                        <h2>${article.title}</h2>
                        <p class="excerpt">${article.excerpt}</p>
                        <div class="footer-meta">
                            <span>${new Date(article.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</span>
                            <span class="read-more">Read More →</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            
            console.log('Rendered Articles:', articles.length);
        }

        function filterArticles() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('category-filter').value;

            const filtered = allArticles.filter(article => {
                const matchesSearch = article.title.toLowerCase().includes(searchTerm) || 
                                     article.excerpt.toLowerCase().includes(searchTerm);
                const matchesCategory = category === 'all' || article.category === category;
                return matchesSearch && matchesCategory;
            });

            renderArticles(filtered);
        }

        document.getElementById('search-input').addEventListener('input', filterArticles);
        document.getElementById('category-filter').addEventListener('change', filterArticles);

        // Initial fetch
        fetchArticles();
    </script>
</body>
</html>
