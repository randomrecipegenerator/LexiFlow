<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | LexiFlow Blog</title>
    <meta name="description" content="{{META_DESCRIPTION}}">
    <link rel="canonical" href="https://lexiflow.com/blog/{{SLUG}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://lexiflow.com/blog/{{SLUG}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{META_DESCRIPTION}}">
    <meta property="og:image" content="https://lexiflow.com/blog/images/{{SLUG}}-hero.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{META_DESCRIPTION}}">

    <!-- JSON-LD BlogPosting Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{TITLE}}",
        "description": "{{META_DESCRIPTION}}",
        "author": { "@type": "Organization", "name": "LexiFlow Legal Suite", "url": "https://lexiflow.com" },
        "datePublished": "{{DATE}}",
        "dateModified": "{{DATE}}",
        "publisher": { "@type": "Organization", "name": "LexiFlow" },
        "mainEntityOfPage": { "@type": "WebPage", "@id": "https://lexiflow.com/blog/{{SLUG}}" },
        "keywords": "{{KEYWORDS}}",
        "articleSection": "{{SECTION}}",
        "about": { "@type": "Thing", "name": "{{PRIMARY_KEYWORD}}" }
    }
    </script>
    {{FAQ_SCHEMA}}

    <style>
        :root { --primary: #1a3a5c; --primary-dark: #0f1f3a; --accent: #c9a84c; --text: #1e293b; --text-muted: #64748b; --bg: #ffffff; --bg-alt: #f8fafc; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: var(--text); background: var(--bg); line-height: 1.75; font-size: 1.0625rem; }
        .container { max-width: 780px; margin: 0 auto; padding: 0 24px; }
        .blog-header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 48px 0 56px; }
        .blog-header h1 { font-size: 2.25rem; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }
        .blog-header .meta { font-size: 0.9rem; color: rgba(255,255,255,0.7); }
        .blog-content { padding: 48px 0 64px; }
        .blog-content h2 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }
        .blog-content h3 { font-size: 1.2rem; font-weight: 600; margin: 28px 0 12px; }
        .blog-content p { margin-bottom: 18px; }
        .blog-content ul, .blog-content ol { margin-bottom: 18px; padding-left: 24px; }
        .blog-content li { margin-bottom: 8px; }
        .blog-content strong { color: var(--primary); }
        .blog-content a { color: var(--primary); }
        .blog-content blockquote { border-left: 4px solid var(--accent); padding: 16px 20px; margin: 24px 0; background: var(--bg-alt); border-radius: 0 8px 8px 0; font-style: italic; }
        .cta-box { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 32px; border-radius: 12px; margin: 40px 0; text-align: center; }
        .cta-box a { display: inline-block; background: var(--accent); color: var(--primary-dark); padding: 14px 32px; border-radius: 8px; font-weight: 600; text-decoration: none; margin-top: 16px; }
        .hipaa-badge { display: inline-block; background: rgba(34,197,94,0.1); color: #16a34a; padding: 4px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 600; }
        .price-badge { display: inline-block; background: var(--accent); color: var(--primary-dark); padding: 4px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; }
        .blog-footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; }
        @media (max-width: 640px) { .blog-header h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <header class="blog-header">
        <div class="container">
            <h1>{{TITLE}}</h1>
            <div class="meta">
                <span>📅 {{DISPLAY_DATE}}</span>
                <span>⏱ {{READ_TIME}} min read</span>
                {{PRICE_BADGE}}
            </div>
        </div>
    </header>
    <main class="blog-content">
        <div class="container">
            {{CONTENT_HTML}}
        </div>
    </main>
    <footer class="blog-footer">
        <div class="container">
            <p>© 2026 LexiFlow Legal Suite. All rights reserved. | <a href="https://lexiflow.com">Home</a> · <a href="mailto:leads@lexiflow.ai">Contact</a></p>
        </div>
    </footer>
</body>
</html>
