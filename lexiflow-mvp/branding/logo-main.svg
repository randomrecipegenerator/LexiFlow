<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Icon: Flowing scales of justice + AI stream -->
  <g transform="translate(10, 10)">
    <!-- Flowing wave/ribbon base -->
    <path d="M30 50 Q30 15 60 15 Q90 15 90 50 Q90 85 60 85 Q30 85 30 50Z"
          fill="url(#iconGrad)" opacity="0.12"/>
    <path d="M35 50 Q35 20 60 20 Q85 20 85 50 Q85 80 60 80 Q35 80 35 50Z"
          fill="url(#iconGrad)" opacity="0.08"/>

    <!-- Scale beam -->
    <line x1="20" y1="50" x2="100" y2="50" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Scale pivot (fulcrum) - stylized triangle -->
    <polygon points="55,70 65,70 60,50" fill="url(#primaryGrad)" opacity="0.9"/>

    <!-- Left pan - flowing downward -->
    <path d="M20 50 Q15 62 10 65 Q20 68 30 65 Q25 62 20 50Z" fill="url(#primaryGrad)" opacity="0.85"/>

    <!-- Right pan - flowing upward (AI asymmetry - unbalanced toward action) -->
    <path d="M100 50 Q105 42 110 40 Q100 37 90 40 Q95 42 100 50Z" fill="url(#primaryGrad)" opacity="0.85"/>

    <!-- AI/data flow dots along right pan -->
    <circle cx="95" cy="43" r="2" fill="#818cf8" opacity="0.9"/>
    <circle cx="102" cy="39" r="2.5" fill="#818cf8" opacity="0.7"/>
    <circle cx="108" cy="42" r="1.5" fill="#818cf8" opacity="0.5"/>

    <!-- Data signal arcs -->
    <path d="M85 35 Q90 30 95 35" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M88 30 Q93 25 98 30" fill="none" stroke="#818cf8" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

    <!-- Small pulse rings -->
    <circle cx="75" cy="50" r="4" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <circle cx="75" cy="50" r="7" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.15"/>
  </g>

  <!-- Wordmark: "LexiFlow" -->
  <g transform="translate(130, 0)">
    <!-- "Lexi" -->
    <text x="0" y="72" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="700" fill="#1e293b" letter-spacing="-1" dominant-baseline="central">Lexi</text>

    <!-- "Flow" -->
    <text x="95" y="72" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="38" font-weight="700" fill="url(#primaryGrad)" letter-spacing="-1" dominant-baseline="central">Flow</text>

    <!-- Tagline -->
    <text x="2" y="100" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="2.5" dominant-baseline="central">AI-POWERED LEGAL INTAKE</text>
  </g>
</svg>