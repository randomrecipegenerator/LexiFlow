<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiFlow Desktop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        header h1 { font-size: 1.5rem; color: #3b82f6; }
        .status-bar { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .status-card { background: #1e293b; padding: 1.5rem; border-radius: 0.5rem; flex: 1; }
        .status-card h3 { font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; }
        .status-card .value { font-size: 1.5rem; font-weight: bold; }
        .btn { background: #3b82f6; color: white; border: none; padding: 0.75rem 1.5rem;
               border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 1px solid #3b82f6; color: #3b82f6; }
        .btn-outline:hover { background: #1e3a5f; }
        .folders { background: #1e293b; border-radius: 0.5rem; padding: 1rem; margin-bottom: 2rem; }
        .folder-item { display: flex; justify-content: space-between; padding: 0.75rem 0;
                       border-bottom: 1px solid #334155; }
        .folder-item:last-child { border-bottom: none; }
        .folder-label { font-weight: 500; }
        .folder-status { color: #22c55e; font-size: 0.875rem; }
        #sync-status { background: #1e293b; border-radius: 0.5rem; padding: 1rem;
                       font-family: monospace; font-size: 0.875rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LexiFlow Desktop</h1>
            <div style="display:flex;align-items:center;gap:0.75rem;">
                <span id="connection-badge" style="padding:0.25rem 0.75rem;border-radius:999px;font-size:0.75rem;background:#22c55e;color:#052e16;">Connected</span>
                <a href="desktop-settings.html" style="background:#1e293b;color:#e2e8f0;text-decoration:none;padding:0.4rem 0.75rem;border-radius:0.375rem;font-size:0.8rem;display:flex;align-items:center;gap:0.375rem;">⚙️ Settings</a>
            </div>
        </header>

        <div class="status-bar">
            <div class="status-card">
                <h3>Watched Folders</h3>
                <div class="value" id="folder-count">0</div>
            </div>
            <div class="status-card">
                <h3>Files Synced</h3>
                <div class="value" id="synced-count">0</div>
            </div>
            <div class="status-card">
                <h3>Last Sync</h3>
                <div class="value" id="last-sync">—</div>
            </div>
        </div>

        <div style="display:flex;gap:1rem;margin-bottom:2rem;">
            <button class="btn" onclick="pickFolder()">+ Add Folder</button>
            <button class="btn btn-outline" onclick="syncNow()">Sync Now</button>
        </div>

        <div class="folders">
            <h3 style="margin-bottom:1rem;">Synced Folders</h3>
            <div id="folder-list"><p style="color:#64748b;">No folders registered. Click "Add Folder" to start.</p></div>
        </div>

        <div>
            <h3 style="margin-bottom:0.5rem;">Sync Log</h3>
            <div id="sync-status">[Sync engine idle]</div>
        </div>
    </div>

    <script>
        async function init() {
            if (!window.lexiflow) {
                document.getElementById('sync-status').textContent = '[Running outside Electron — UI preview mode]';
                return;
            }
            
            // Check connection
            const conn = await window.lexiflow.checkCloudConnection();
            const badge = document.getElementById('connection-badge');
            if (conn.connected) {
                badge.textContent = 'Connected';
                badge.style.background = '#22c55e';
                badge.style.color = '#052e16';
            } else {
                badge.textContent = 'Offline';
                badge.style.background = '#ef4444';
                badge.style.color = '#450a0a';
            }

            // Load folders
            await loadFolders();
            await updateSyncStatus();

            // Listen for new folders
            window.lexiflow.onFolderRegistered(async (data) => {
                await loadFolders();
            });
        }

        async function loadFolders() {
            if (!window.lexiflow) return;
            const data = await window.lexiflow.getFolders();
            const list = document.getElementById('folder-list');
            const count = document.getElementById('folder-count');
            
            if (!data.folders || data.folders.length === 0) {
                list.innerHTML = '<p style="color:#64748b;">No folders registered. Click "Add Folder" to start.</p>';
                count.textContent = '0';
                return;
            }

            count.textContent = data.folders.length;
            list.innerHTML = data.folders.map(f => `
                <div class="folder-item">
                    <div>
                        <div class="folder-label">${f.label || f.local_path.split('/').pop()}</div>
                        <div style="font-size:0.75rem;color:#64748b;">${f.local_path}</div>
                    </div>
                    <div class="folder-status">${f.total_files || 0} files</div>
                </div>
            `).join('');
        }

        async function updateSyncStatus() {
            if (!window.lexiflow) return;
            const status = await window.lexiflow.getSyncStatus();
            document.getElementById('synced-count').textContent = status.syncedFiles || 0;
            document.getElementById('last-sync').textContent = status.lastSyncAt 
                ? new Date(status.lastSyncAt).toLocaleTimeString() : '—';
            document.getElementById('sync-status').textContent = JSON.stringify(status, null, 2);
        }

        async function pickFolder() {
            if (!window.lexiflow) return;
            await window.lexiflow.pickFolder();
        }

        async function syncNow() {
            if (!window.lexiflow) return;
            await window.lexiflow.syncNow();
            await updateSyncStatus();
        }

        // Poll sync status every 5 seconds
        setInterval(updateSyncStatus, 5000);
        init();
    </script>
</body>
</html>
