<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <style>
    /* Mobile-Friendly Adjustments */
    @media (max-width: 768px) {
        .container, .nav-container, .max-w-screen, .max-w, .hero-container, .footer-container { 
            padding-left: 20px !important; 
            padding-right: 20px !important; 
            width: 100% !important;
            max-width: 100% !important;
        }
        .grid, .highlight-grid, .faq-grid, .pricing-grid, .assoc-grid, .city-grid { 
            grid-template-columns: 1fr !important; 
            display: grid !important;
            gap: 20px !important;
        }
        .hero-container, .footer-container, .section-header { 
            grid-template-columns: 1fr !important; 
            text-align: center !important; 
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
        }
        .hero-text, .hero-image, .footer-col {
            width: 100% !important;
            margin-bottom: 30px !important;
        }
        h1 { font-size: 28px !important; line-height: 1.2 !important; }
        h2 { font-size: 24px !important; }
        h3 { font-size: 20px !important; }
        
        /* Nav adjustments */
        nav, .nav { height: auto !important; padding: 10px 0 !important; min-height: 60px; }
        .nav-container, .nav .container { flex-direction: row !important; flex-wrap: wrap !important; justify-content: space-between !important; padding: 10px 20px !important; }
        .nav-links { flex-direction: column !important; align-items: center !important; gap: 10px !important; display: none !important; width: 100% !important; order: 3; padding: 20px 0 !important; }
        .nav-links.active { display: flex !important; }
        .nav-toggle { display: block !important; background: #1a3a5c; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 20px; order: 2; }
        .btn-cta, .btn-primary { padding: 8px 16px !important; font-size: 13px !important; }
        
        /* Card and Feature adjustments */
        .card, .pricing-card, .highlight-item, .faq-item, .assoc-card, .city-link { 
            margin-bottom: 20px !important; 
            width: 100% !important;
            min-width: 0 !important;
        }
        .pricing-card.featured { transform: none !important; margin: 20px 0 !important; }
    }
        </style>
</head>
  <body>
    <script>(function(){
      var props = {};

      function addObject(obj) {
        if (obj == null) return;
        try {
          Object.getOwnPropertyNames(obj).forEach(add);
        } catch(ex) {}
        if (obj.prototype) {
          Object.getOwnPropertyNames(obj.prototype).forEach(add);
        }
        if (typeof obj == "function") {
          try {
            Object.getOwnPropertyNames(new obj).forEach(add);
          } catch(ex) {}
        }
      }

      function add(name) {
        if (/^[a-z_$][a-z0-9_$]*$/i.test(name)) {
            props[name] = true;
        }
      }

      Object.getOwnPropertyNames(window).forEach(function(thing){
        addObject(window[thing]);
      });

      try {
        addObject(new Event("click"));
        addObject(new Event("contextmenu"));
        addObject(new Event("mouseup"));
        addObject(new Event("mousedown"));
        addObject(new Event("keydown"));
        addObject(new Event("keypress"));
        addObject(new Event("keyup"));
        addObject(new Event("input"));
        addObject(new Event("touchstart"));
        addObject(new Event("touchmove"));
        addObject(new Event("touchend"));
        addObject(new Event("touchcancel"));
        addObject(new Event("pointerdown"));
        addObject(new Event("pointermove"));
        addObject(new Event("pointerup"));
        addObject(new Event("pointercancel"));
        addObject(new Event("pointerenter"));
        addObject(new Event("pointerleave"));
      } catch(ex) {console.error(ex)}

      try {
        addObject(Temporal.Duration.from({ years: 1 }));
        addObject(new Temporal.Instant());
        addObject(Temporal.Now);
        addObject(new Temporal.PlainDate(2021, 7, 1));
        addObject(new Temporal.ZonedDateTime(0n, "America/New_York"));
        addObject(new Temporal.PlainYearMonth(2021, 7));
        addObject(new Temporal.PlainTime());
        addObject(new Temporal.PlainMonthDay(7, 1));
        addObject(new Temporal.PlainDateTime(2021, 7, 1));
      } catch(ex) {console.error(ex)}

      var ta = document.createElement("textarea");
      ta.style.width = "100%";
      ta.style.height = "20em";
      ta.style.boxSizing = "border-box";
      ta.value = 'export var domprops = ' + JSON.stringify(Object.keys(props).sort(cmp), null, 4);
      document.body.appendChild(ta);

      function cmp(a, b) {
        a = a.toLowerCase();
        b = b.toLowerCase();
        return a < b ? -1 : a > b ? 1 : 0;
      }
    })();</script>
  
        <script>
        // Mobile menu toggle helper
        document.addEventListener('DOMContentLoaded', function() {
            var toggle = document.querySelector('.nav-toggle');
            var links = document.getElementById('navLinks');
            if (toggle && links) {
                toggle.addEventListener('click', function() {
                    links.classList.toggle('active');
                });
            }
        });
        </script>
        
</body>
</html>
