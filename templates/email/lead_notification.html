<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Inter', Helvetica, Arial, sans-serif; color: #0f172a; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: #1a3a5c; text-decoration: none; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #c9a84c; color: #0f172a; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }
        .footer { margin-top: 40px; font-size: 12px; color: #94a3b8; text-align: center; }
        .badge { display: inline-block; padding: 4px 12px; background: #e2e8f0; border-radius: 100px; font-size: 12px; font-weight: bold; }
        .score { color: #059669; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://lexiflow.co" class="logo">LexiFlow</a>
        </div>
        <div class="badge">New Lead Captured</div>
        <h1>{{lead_name}}</h1>
        <p><strong>Case Type:</strong> {{case_type}}</p>
        <p><strong>AI Qualification Score:</strong> <span class="score">{{score}}/100</span></p>
        
        <div style="background: #f8fafc; padding: 15px; border-radius: 8px; margin: 20px 0;">
            <p><strong>AI Summary:</strong></p>
            <p>{{summary}}</p>
        </div>

        <div style="text-align: center;">
            <a href="https://app.lexiflow.co/leads/{{lead_id}}" class="btn">View Lead Details</a>
        </div>
        
        <div class="footer">
            &copy; 2026 LexiFlow Technologies Inc. | Enterprise Legal AI
        </div>
    </div>
</body>
</html>
