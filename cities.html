<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cities We Serve | LexiFlow Legal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0f172a;
      --gold: #c9a84c;
      --slate-50: #f8fafc;
      --slate-200: #e2e8f0;
      --slate-600: #475569;
    }
    body { font-family: 'Inter', sans-serif; background: var(--slate-50); color: var(--navy); margin: 0; padding: 0; }
    nav { height: 80px; background: #fff; border-bottom: 1px solid var(--slate-200); display: flex; align-items: center; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px; width: 100%; }
    .logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 24px; color: var(--navy); text-decoration: none; }
    header { padding: 60px 0; background: var(--navy); color: #fff; text-align: center; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 16px; }
    header p { color: var(--gold); font-size: 18px; }
    .city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; padding: 60px 0; }
    .city-link { background: #fff; padding: 16px; border-radius: 8px; border: 1px solid var(--slate-200); text-decoration: none; color: var(--navy); font-weight: 500; transition: all 0.2s; text-align: center; }
    .city-link:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    footer { padding: 40px 0; background: #fff; border-top: 1px solid var(--slate-200); text-align: center; color: var(--slate-600); font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="index.html" class="logo">LexiFlow</a>
    </div>
  </nav>
  <header>
    <div class="container">
      <h1>Areas We Serve</h1>
      <p>Enterprise Legal AI Solutions for Firms Across the United States</p>
    </div>
  </header>
  <div class="container">
    <div class="city-grid" id="city-list">
      <!-- City links will be inserted here -->
    </div>
  </div>
  <footer>
    &copy; 2026 LexiFlow Legal Suite.
  </footer>
</body>
</html>
