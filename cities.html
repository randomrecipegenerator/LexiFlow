        body { font-family: 'Inter', sans-serif; background: #fff; color: var(--navy); margin: 0; line-height: 1.6; }
        .max-w { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
        header { padding: 100px 0 60px; background: radial-gradient(circle at 50% 0%, rgba(26, 58, 92, 0.05), transparent); text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 56px; margin-bottom: 24px; letter-spacing: -0.02em; }
        .city-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding: 80px 0; }
        .city-link { display: block; padding: 20px; background: var(--slate-50); border: 1px solid var(--slate-200); border-radius: 12px; font-weight: 600; text-decoration: none; color: var(--navy); transition: all 0.2s ease; text-align: center; font-size: 15px; }
        .city-link:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); color: var(--gold); }
        footer { padding: 80px 0; background: var(--navy); color: #fff; text-align: center; }
    </style>
</head>
