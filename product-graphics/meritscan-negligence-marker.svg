<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Top label -->
  <rect x="24" y="20" width="200" height="32" rx="8" fill="#2563eb" opacity="0.1"/>
  <text x="124" y="36" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle" dominant-baseline="central">MeritScan — Medical Record Analysis</text>
  <!-- Medical record lines (left side) -->
  <g transform="translate(40, 80)">
    <rect x="0" y="0" width="320" height="340" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="16" y="24" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e3a5f">PATIENT RECORD — 03/10/2026</text>
    <line x1="0" y1="36" x2="320" y2="36" stroke="#e2e8f0" stroke-width="1"/>
    <text x="16" y="56" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b">10:00 — Admitted w/ abdominal pain</text>
    <text x="16" y="76" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">Patient reports severe pain, nausea. BP 160/95.</text>
    <text x="16" y="100" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b">03/12 14:00 — Lab Results</text>
    <text x="16" y="120" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">WBC: 18.2 (H) | Lactate: 4.1 (H) | CRP: 45</text>
    <!-- Alert highlight box -->
    <rect x="12" y="136" width="296" height="80" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <rect x="12" y="136" width="4" height="80" rx="2" fill="#ef4444"/>
    <circle cx="28" cy="152" r="6" fill="#ef4444"/>
    <text x="40" y="156" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="700" fill="#dc2626">⚠ NEGLIGENCE MARKER DETECTED</text>
    <text x="20" y="174" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#7f1d1d">Lab values indicate sepsis — CDC recommends intervention</text>
    <text x="20" y="190" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#7f1d1d"><tspan font-weight="600">within 3 hours.</tspan> Next physician note: 03/13 08:00</text>
    <text x="20" y="210" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#dc2626" font-weight="600">→ 18-hour gap: STANDARD OF CARE BREACH</text>
    <text x="16" y="240" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b">03/13 08:00 — Physician Note</text>
    <text x="16" y="260" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">"Patient appears stable. Monitoring"</text>
    <text x="16" y="284" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b">03/15 — ICU Transfer</text>
    <text x="16" y="304" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">Septic shock. Patient transferred to ICU.</text>
  </g>
  <!-- Analysis panel (right side) -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="360" height="340" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="0" y="0" width="360" height="40" rx="10" fill="#f8fafc"/>
    <text x="180" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e3a5f" text-anchor="middle">🧬 AI Analysis Results</text>
    <line x1="0" y1="40" x2="360" y2="40" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Negligence markers -->
    <g transform="translate(16, 56)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b">NEGLIGENCE MARKERS FOUND: 3</text>
      <!-- Marker 1 -->
      <rect x="0" y="12" width="328" height="44" rx="6" fill="#fef2f2"/>
      <circle cx="16" cy="34" r="4" fill="#ef4444"/>
      <text x="28" y="30" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#dc2626">Sepsis Response Delay (Critical)</text>
      <text x="28" y="46" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#7f1d1d">CDC window: 3h | Actual: 18h | Severity: High</text>
      <!-- Marker 2 -->
      <rect x="0" y="64" width="328" height="44" rx="6" fill="#fffbeb"/>
      <circle cx="16" cy="86" r="4" fill="#d97706"/>
      <text x="28" y="82" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">Missing Vital Signs (Moderate)</text>
      <text x="28" y="98" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#92400e">No BP/HR recorded between 14:00–22:00 on 03/12</text>
      <!-- Marker 3 -->
      <rect x="0" y="116" width="328" height="44" rx="6" fill="#fffbeb"/>
      <circle cx="16" cy="138" r="4" fill="#d97706"/>
      <text x="28" y="134" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">Incomplete Handoff Note (Moderate)</text>
      <text x="28" y="150" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#92400e">Shift change at 19:00 — no SBAR documentation</text>
    </g>
    <!-- Merit score -->
    <g transform="translate(16, 230)">
      <rect x="0" y="0" width="328" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <text x="16" y="22" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#16a34a">📊 Merit Score: 84/100</text>
      <text x="16" y="42" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#166534">High viability — Standard of Care breach confirmed. Estimated settlement range: $450K–$1.2M</text>
    </g>
    <!-- Actions -->
    <g transform="translate(16, 304)">
      <rect x="0" y="0" width="156" height="28" rx="6" fill="#2563eb"/>
      <text x="78" y="14" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="central">Download Full Report</text>
      <rect x="168" y="0" width="148" height="28" rx="6" fill="#1e3a5f"/>
      <text x="242" y="14" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="white" text-anchor="middle" dominant-baseline="central">Engage Expert Reviewer</text>
    </g>
  </g>
</svg>