<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexiFlow | Enterprise Suite</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./shared-layout.css">
    <style>
        .mt-header { margin-top: 80px; }
        .enterprise-card { border-top: 4px solid #c9a84c; background: white; border-radius: 12px; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 24px; }
        .gold-badge { background: #fef9c3; color: #854d0e; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav><div class="nav-container">
        <a href="./" class="logo"><span>LF</span> LexiFlow</a>
        <ul class="nav-links">
            <li><a href="./dashboard.html">Dashboard</a></li>
            <li><a href="./intake-app.html">Intake</a></li>
            <li><a href="./enterprise-app.html" class="active">Enterprise</a></li>
        </ul>
    </div></nav>

    <div class="mt-header bg-navy text-white py-12" style="background: #0f172a;">
        <div class="container mx-auto px-4">
            <div class="flex items-center space-x-3 mb-4">
                <i class="fas fa-shield-alt text-gold text-3xl" style="color: #c9a84c;"></i>
                <h1 class="text-3xl font-bold" id="module-title">Enterprise Legal Suite</h1>
            </div>
            <p class="text-slate-400 max-w-2xl" id="module-desc">High-performance AI litigation modules for enterprise-scale law firms.</p>
        </div>
    </div>

    <main class="container mx-auto px-4 -mt-8">
        <div id="content-area" class="space-y-8">
            <!-- Content injected here -->
            <div class="enterprise-card text-center py-20">
                <i class="fas fa-circle-notch fa-spin text-3xl text-gold mb-4"></i>
                <p>Loading Enterprise Intelligence...</p>
            </div>
        </div>
    </main>

    <script src="./config.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const module = params.get('module') || 'discovery';

        async function loadModule() {
            const titleEl = document.getElementById('module-title');
            const descEl = document.getElementById('module-desc');
            const contentEl = document.getElementById('content-area');

            try {
                if (module === 'discovery') {
                    titleEl.textContent = 'Discovery-Vault™';
                    descEl.textContent = 'AI-powered discovery document analysis and privilege logging.';
                    const data = await apiFetch('/api/enterprise/discovery/overview');
                    renderDiscovery(data, contentEl);
                } else if (module === 'settlement') {
                    titleEl.textContent = 'Settlement-Predictor Pro™';
                    descEl.textContent = 'Advanced case valuation and settlement probability modeling.';
                    const data = await apiFetch('/api/enterprise/settlement/overview');
                    renderSettlement(data, contentEl);
                } else if (module === 'compliance') {
                    titleEl.textContent = 'Compliance-Shield™';
                    descEl.textContent = 'Immutable audit trails and HIPAA/SOC2 regulatory monitoring.';
                    const data = await apiFetch('/api/enterprise/compliance/overview');
                    renderCompliance(data, contentEl);
                }
            } catch (err) {
                console.error('Enterprise API failed', err);
                contentEl.innerHTML = `
                    <div class="enterprise-card bg-red-50 border-red-200">
                        <h3 class="text-red-800 font-bold">Connection Error</h3>
                        <p class="text-red-600">This enterprise module is currently in Demo mode and requires the Enterprise API router to be active.</p>
                    </div>
                `;
            }
        }

        function renderDiscovery(data, container) {
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="enterprise-card">
                        <span class="text-slate-400 text-xs font-bold uppercase">Docs Analyzed</span>
                        <div class="text-2xl font-bold text-navy">${data.total_documents_processed.toLocaleString()}</div>
                    </div>
                    <div class="enterprise-card">
                        <span class="text-slate-400 text-xs font-bold uppercase">Hours Saved</span>
                        <div class="text-2xl font-bold text-navy">${data.total_hours_saved} hrs</div>
                    </div>
                    <div class="enterprise-card">
                        <span class="text-slate-400 text-xs font-bold uppercase">Critical Findings</span>
                        <div class="text-2xl font-bold text-red-600">${data.critical_docs_found}</div>
                    </div>
                </div>
                <div class="enterprise-card mt-8">
                    <h3 class="font-bold mb-6">Active Discovery Cases</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-xs text-slate-400 border-b">
                                    <th class="pb-3">Case Name</th>
                                    <th class="pb-3">Type</th>
                                    <th class="pb-3">Total Docs</th>
                                    <th class="pb-3">Status</th>
                                </tr>
                            </thead>
                            <tbody>
            `;
            data.cases.forEach(c => {
                html += `
                    <tr class="border-b last:border-0">
                        <td class="py-4 font-bold text-navy">${c.case_name}</td>
                        <td class="py-4 text-sm">${c.case_type}</td>
                        <td class="py-4 text-sm">${c.total_documents.toLocaleString()}</td>
                        <td class="py-4"><span class="gold-badge">${c.processing_status}</span></td>
                    </tr>
                `;
            });
            html += `</tbody></table></div></div>`;
            container.innerHTML = html;
        }

        function renderSettlement(data, container) {
            let html = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="enterprise-card">
                        <span class="text-slate-400 text-xs font-bold uppercase">Avg. Prediction Confidence</span>
                        <div class="text-3xl font-bold text-navy">${data.average_confidence}%</div>
                    </div>
                    <div class="enterprise-card">
                        <span class="text-slate-400 text-xs font-bold uppercase">Total Value Analyzed</span>
                        <div class="text-3xl font-bold text-navy">$${(data.total_demand_amount / 1000000).toFixed(1)}M</div>
                    </div>
                </div>
                <div class="enterprise-card mt-8">
                    <h3 class="font-bold mb-6">Case Valuation Models</h3>
                    <div class="space-y-4">
            `;
            data.cases.forEach(c => {
                html += `
                    <div class="p-4 border rounded-lg hover:border-gold transition cursor-pointer">
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="font-bold text-navy">${c.case_name}</div>
                                <div class="text-xs text-slate-500">${c.case_type}</div>
                            </div>
                            <div class="text-right">
                                <div class="font-mono font-bold text-navy">$${c.demand_amount.toLocaleString()}</div>
                                <div class="text-[10px] text-green-600 font-bold uppercase">${c.ai_confidence}% CONFIDENCE</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
            container.innerHTML = html;
        }

        function renderCompliance(data, container) {
            container.innerHTML = `
                <div class="enterprise-card">
                    <div class="flex items-center justify-between mb-8">
                        <h3 class="font-bold text-xl">Firm Compliance Status</h3>
                        <span class="bg-green-100 text-green-800 px-4 py-1 rounded-full font-bold text-sm">ACTIVE MONITORING</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="text-center p-6 bg-slate-50 rounded-xl">
                            <div class="text-sm text-slate-400 font-bold">Health Score</div>
                            <div class="text-3xl font-bold text-navy">${data.average_score}%</div>
                        </div>
                        <div class="text-center p-6 bg-slate-50 rounded-xl">
                            <div class="text-sm text-slate-400 font-bold">Compliant Firms</div>
                            <div class="text-3xl font-bold text-green-600">${data.compliant_firms}</div>
                        </div>
                        <div class="text-center p-6 bg-slate-50 rounded-xl">
                            <div class="text-sm text-slate-400 font-bold">Critical Findings</div>
                            <div class="text-3xl font-bold text-red-600">${data.critical_findings_total}</div>
                        </div>
                        <div class="text-center p-6 bg-slate-50 rounded-xl">
                            <div class="text-sm text-slate-400 font-bold">Monitored Firms</div>
                            <div class="text-3xl font-bold text-navy">${data.total_firms_monitored}</div>
                        </div>
                    </div>
                    <div class="mt-8 p-6 border-2 border-dashed border-slate-200 rounded-xl text-center">
                        <p class="text-slate-500 mb-4">Enterprise Compliance Shield is managing all firm encryption keys and audit trails.</p>
                        <button class="bg-navy text-gold px-6 py-2 rounded-lg font-bold">Download SOC2 Report</button>
                    </div>
                </div>
            `;
        }

        loadModule();
    </script>
</body>
</html>
