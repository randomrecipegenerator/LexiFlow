<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- === LEFT SPLIT: "Closed" Law Firm === -->
  <rect x="0" y="0" width="800" height="900" fill="url(#leftGrad)"/>

  <!-- Dark overlay for empty feel -->
  <rect x="0" y="0" width="800" height="900" fill="#000" opacity="0.3"/>

  <!-- Law firm door frame -->
  <rect x="200" y="180" width="400" height="600" rx="8" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <rect x="220" y="200" width="360" height="560" rx="4" fill="#0f172a" stroke="#475569" stroke-width="2"/>

  <!-- Door panels -->
  <rect x="240" y="220" width="320" height="200" rx="4" fill="#1a2332"/>
  <rect x="240" y="440" width="150" height="100" rx="4" fill="#1a2332"/>
  <rect x="410" y="440" width="150" height="100" rx="4" fill="#1a2332"/>

  <!-- Door handle -->
  <rect x="520" y="480" width="12" height="40" rx="6" fill="#64748b"/>
  <circle cx="526" cy="500" r="8" fill="#475569"/>

  <!-- "CLOSED" sign hanging -->
  <line x1="400" y1="180" x2="400" y2="280" stroke="#94a3b8" stroke-width="2"/>
  <rect x="320" y="280" width="160" height="60" rx="6" fill="#dc2626" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="306" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="central">CLOSED</text>
  <text x="400" y="326" font-family="'Inter', system-ui, sans-serif" font-size="10" weight="400" fill="#fca5a5" text-anchor="middle" dominant-baseline="central">9 AM - 5 PM</text>

  <!-- Nameplate -->
  <rect x="300" y="560" width="200" height="36" rx="4" fill="#334155"/>
  <text x="400" y="582" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">LAW OFFICES</text>

  <!-- "Missed Call" notification -->
  <g transform="translate(420, 640)">
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#dc2626" opacity="0.8"/>
    <text x="80" y="18" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="central">📞 3 Missed Calls</text>
  </g>

  <!-- Left side label -->
  <text x="400" y="80" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#dc2626" text-anchor="middle">BEFORE</text>
  <text x="400" y="110" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="middle">Without LexiFlow — office closes, leads evaporate</text>

  <!-- Clock showing 5:01 PM -->
  <g transform="translate(80, 60)">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#64748b" stroke-width="3"/>
    <line x1="40" y1="40" x2="40" y2="18" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="60" y2="40" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="90" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#dc2626" text-anchor="middle">5:01 PM</text>
  </g>

  <!-- === DIVIDER === -->
  <rect x="790" y="0" width="20" height="900" fill="url(#accent)" opacity="0.6"/>

  <!-- === RIGHT SPLIT: LexiFlow Active at 2 AM === -->
  <rect x="810" y="0" width="790" height="900" fill="url(#rightGrad)"/>

  <!-- Subtle glow orbs on right -->
  <circle cx="1100" cy="400" r="250" fill="#2563eb" opacity="0.04"/>
  <circle cx="1400" cy="700" r="200" fill="#6366f1" opacity="0.03"/>

  <!-- Right side label -->
  <text x="1205" y="80" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#16a34a" text-anchor="middle">AFTER</text>
  <text x="1205" y="110" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="400" fill="#94a3b8" text-anchor="middle">With LexiFlow — 24/7 AI captures every lead</text>

  <!-- Clock showing 2:00 AM -->
  <g transform="translate(900, 60)">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#2563eb" stroke-width="3"/>
    <line x1="40" y1="40" x2="40" y2="18" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="55" y2="45" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="90" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">2:00 AM</text>
  </g>

  <!-- Dashboard mockup on right -->
  <g transform="translate(970, 160)">
    <!-- Browser frame -->
    <rect x="0" y="0" width="560" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#glow)"/>
    <!-- Window controls -->
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#fbbf24"/>
    <circle cx="60" cy="20" r="6" fill="#16a34a"/>
    <text x="280" y="24" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">LexiFlow AI — Active</text>

    <!-- Dashboard mini content -->
    <g transform="translate(16, 48)">
      <!-- Notification: New lead captured -->
      <rect x="0" y="0" width="200" height="32" rx="6" fill="#2563eb"/>
      <text x="10" y="16" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" dominant-baseline="central">$50K Lead Captured</text>

      <!-- Chat UI -->
      <rect x="0" y="48" width="240" height="160" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <rect x="8" y="56" width="160" height="24" rx="8" fill="#2563eb" opacity="0.2"/>
      <text x="16" y="72" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#60a5fa">Hi! I'm LexiFlow AI.</text>
      <rect x="8" y="88" width="180" height="24" rx="8" fill="#16a34a" opacity="0.2"/>
      <text x="16" y="104" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#16a34a">I was in a car accident...</text>
      <rect x="8" y="120" width="200" height="40" rx="8" fill="#2563eb" opacity="0.2"/>
      <text x="16" y="136" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#60a5fa">I'm sorry to hear that.</text>
      <text x="16" y="150" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#60a5fa">Let me qualify your case.</text>

      <!-- Right: Lead scoring -->
      <g transform="translate(256, 48)">
        <rect x="0" y="0" width="272" height="100" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
        <text x="12" y="20" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0">📊 AI Assessment</text>
        <line x1="0" y1="32" x2="272" y2="32" stroke="#334155" stroke-width="0.5"/>
        <text x="12" y="50" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">Case: Auto Accident</text>
        <text x="12" y="66" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">Est. Value: $50K–$150K</text>
        <rect x="12" y="74" width="60" height="18" rx="9" fill="#16a34a" opacity="0.2"/>
        <text x="42" y="86" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a" text-anchor="middle">Score: 82</text>
      </g>

      <!-- Stats row -->
      <g transform="translate(0, 220)">
        <rect x="0" y="0" width="528" height="60" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
        <rect x="12" y="10" width="120" height="40" rx="6" fill="#2563eb" opacity="0.1"/>
        <text x="72" y="26" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#60a5fa" text-anchor="middle">247</text>
        <text x="72" y="42" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Calls Taken</text>
        <rect x="144" y="10" width="120" height="40" rx="6" fill="#16a34a" opacity="0.1"/>
        <text x="204" y="26" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#16a34a" text-anchor="middle">183</text>
        <text x="204" y="42" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Emails</text>
        <rect x="276" y="10" width="120" height="40" rx="6" fill="#d97706" opacity="0.1"/>
        <text x="336" y="26" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#fbbf24" text-anchor="middle">412</text>
        <text x="336" y="42" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Web Leads</text>
      </g>
    </g>
  </g>

  <!-- "New Lead" notification popup -->
  <g transform="translate(980, 600)">
    <rect x="0" y="0" width="280" height="50" rx="10" fill="#16a34a" opacity="0.12" stroke="#16a34a" stroke-width="1"/>
    <text x="16" y="20" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#16a34a">🔔 New Qualified Lead</text>
    <text x="16" y="38" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#94a3b8">Maria Gonzalez — Score: 82 — Auto Accident</text>
  </g>

  <!-- Integration badges row -->
  <g transform="translate(960, 680)">
    <text x="200" y="0" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#64748b" text-anchor="middle">Powered by:</text>
    <g transform="translate(40, 14)">
      <rect x="0" y="0" width="60" height="24" rx="6" fill="#334155"/>
      <text x="30" y="12" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Clio</text>
      <rect x="68" y="0" width="60" height="24" rx="6" fill="#334155"/>
      <text x="98" y="12" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Filevine</text>
      <rect x="136" y="0" width="60" height="24" rx="6" fill="#334155"/>
      <text x="166" y="12" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Vapi</text>
      <rect x="204" y="0" width="60" height="24" rx="6" fill="#334155"/>
      <text x="234" y="12" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Postmark</text>
    </g>
  </g>
</svg>