<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" rx="12" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="56" rx="12" fill="#0f172a"/>
  <rect x="0" y="40" width="800" height="16" fill="#0f172a"/>
  <text x="24" y="34" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">🔍 Lead Detail View</text>
  <text x="240" y="34" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">AI Summary &amp; Case Assessment</text>

  <!-- === LEFT: Lead Info Card === -->
  <g transform="translate(24, 80)">
    <rect x="0" y="0" width="360" height="480" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>

    <!-- Lead avatar and name -->
    <circle cx="180" cy="60" r="36" fill="#2563eb" opacity="0.2"/>
    <text x="180" y="60" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">JT</text>
    <text x="180" y="110" font-family="'Inter', system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle">James Thompson</text>
    <text x="180" y="132" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">james.thompson@email.com</text>

    <!-- Score badge -->
    <g transform="translate(130, 150)">
      <rect x="0" y="0" width="100" height="28" rx="14" fill="#16a34a" opacity="0.15"/>
      <text x="50" y="14" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#16a34a" text-anchor="middle" dominant-baseline="central">Score: 91 ⭐</text>
    </g>

    <line x1="20" y1="200" x2="340" y2="200" stroke="#334155" stroke-width="1"/>

    <!-- Lead details -->
    <g transform="translate(24, 220)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">CASE TYPE</text>
      <text x="0" y="20" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">Aviation Litigation — Boeing 737 MAX</text>

      <text x="0" y="50" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">SOURCE</text>
      <rect x="0" y="60" width="60" height="20" rx="10" fill="#2563eb" opacity="0.15"/>
      <text x="30" y="73" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#60a5fa" text-anchor="middle" dominant-baseline="central">Web</text>

      <text x="0" y="100" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">DATE &amp; TIME</text>
      <text x="0" y="120" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">May 25, 2026 — 2:34 PM PDT</text>

      <text x="0" y="150" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">STATUS</text>
      <rect x="0" y="160" width="80" height="22" rx="11" fill="#dc2626" opacity="0.15"/>
      <text x="40" y="174" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444" text-anchor="middle" dominant-baseline="central">⚠ Urgent</text>

      <text x="0" y="210" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">CRM SYNC</text>
      <rect x="0" y="220" width="100" height="22" rx="11" fill="#16a34a" opacity="0.12"/>
      <text x="50" y="234" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#16a34a" text-anchor="middle" dominant-baseline="central">✓ Clio Synced</text>
    </g>
  </g>

  <!-- === RIGHT: AI Summary === -->
  <g transform="translate(408, 80)">
    <rect x="0" y="0" width="360" height="300" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="360" height="40" rx="12" fill="#0f172a"/>
    <rect x="0" y="24" width="360" height="16" fill="#0f172a"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">🤖 AI Summary</text>
    <rect x="260" y="10" width="85" height="22" rx="11" fill="#2563eb" opacity="0.15"/>
    <text x="302" y="21" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#60a5fa" text-anchor="middle">Reasoning AI</text>

    <g transform="translate(16, 56)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Case Narrative</text>
      <text x="0" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" fill="#cbd5e1" line-height="1.6">
        <tspan x="0" dy="0">High-value mass tort lead. Surviving family</tspan>
        <tspan x="0" dy="18">member of Boeing 737 MAX crash (Ethiopian</tspan>
        <tspan x="0" dy="18">Airlines Flight 302). Two dependents.</tspan>
        <tspan x="0" dy="18">Jurisdiction: Illinois (Northern District).</tspan>
      </text>

      <text x="0" y="100" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Settlement Estimate</text>
      <text x="0" y="124" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#60a5fa">$2M – $5M</text>

      <text x="0" y="156" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#94a3b8">Priority Flags</text>
      <rect x="0" y="168" width="140" height="22" rx="11" fill="#dc2626" opacity="0.15"/>
      <text x="70" y="182" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#ef4444" text-anchor="middle">NTSB Hearing: June 3</text>
      <rect x="150" y="168" width="120" height="22" rx="11" fill="#2563eb" opacity="0.12"/>
      <text x="210" y="182" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#60a5fa" text-anchor="middle">Mass Tort Lead</text>
    </g>
  </g>

  <!-- === RIGHT BOTTOM: Case Timeline === -->
  <g transform="translate(408, 400)">
    <rect x="0" y="0" width="360" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="16" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">📅 Case Timeline</text>

    <g transform="translate(16, 40)">
      <!-- Timeline line -->
      <line x1="8" y1="0" x2="8" y2="100" stroke="#334155" stroke-width="2"/>
      <circle cx="8" cy="0" r="5" fill="#2563eb"/>
      <text x="24" y="4" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#e2e8f0">Lead captured via Web</text>
      <text x="280" y="4" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">2:34 PM</text>

      <circle cx="8" cy="28" r="5" fill="#16a34a"/>
      <text x="24" y="32" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#e2e8f0">AI scored: 91 — High priority</text>
      <text x="280" y="32" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">2:34 PM</text>

      <circle cx="8" cy="56" r="5" fill="#d97706"/>
      <text x="24" y="60" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#e2e8f0">NTSB flag triggered — Urgent</text>
      <text x="280" y="60" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">2:35 PM</text>

      <circle cx="8" cy="84" r="5" fill="#2563eb"/>
      <text x="24" y="88" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="500" fill="#e2e8f0">Synced to Clio Grow ✓</text>
      <text x="280" y="88" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">2:36 PM</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <g transform="translate(24, 575)">
    <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="400" fill="#475569">LexiFlow AI — Every lead gets a complete AI analysis, settlement estimate, and priority assessment in seconds.</text>
  </g>
</svg>