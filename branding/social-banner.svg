<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative elements -->
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Glowing orb top-right -->
  <circle cx="950" cy="100" r="250" fill="url(#accentGrad)" opacity="0.06"/>
  <circle cx="250" cy="500" r="200" fill="#6366f1" opacity="0.04"/>

  <!-- Flow wave across bottom -->
  <path d="M0 500 Q150 450 300 480 Q450 510 600 470 Q750 430 900 460 Q1050 490 1200 450 L1200 630 L0 630Z" fill="url(#flowGrad)"/>

  <!-- Logo Icon (large) -->
  <g transform="translate(80, 165) scale(1.8)">
    <!-- Scale beam -->
    <line x1="0" y1="50" x2="100" y2="50" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Fulcrum -->
    <polygon points="45,72 55,72 50,50" fill="url(#accentGrad)" opacity="0.95"/>
    <!-- Left pan -->
    <path d="M0 50 Q-5 62 -12 65 Q-2 68 10 65 Q5 62 0 50Z" fill="url(#accentGrad)" opacity="0.9"/>
    <!-- Right pan -->
    <path d="M100 50 Q105 40 112 38 Q102 35 92 38 Q97 40 100 50Z" fill="url(#accentGrad)" opacity="0.9"/>
    <!-- Data dots -->
    <circle cx="94" cy="41" r="2.5" fill="#818cf8" opacity="0.9"/>
    <circle cx="102" cy="37" r="3" fill="#818cf8" opacity="0.6"/>
    <circle cx="108" cy="40" r="2" fill="#818cf8" opacity="0.4"/>
  </g>

  <!-- Headline -->
  <text x="260" y="220" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-2">Lexi</text>
  <text x="440" y="220" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="62" font-weight="700" fill="url(#accentGrad)" letter-spacing="-2">Flow</text>

  <!-- Subheadline -->
  <text x="260" y="270" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="300" fill="#94a3b8" letter-spacing="3">AI-POWERED LEGAL INTAKE &amp; LEAD QUALIFICATION</text>

  <!-- Feature pills -->
  <g transform="translate(260, 310)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#ffffff" opacity="0.08"/>
    <text x="70" y="16" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">24/7 AI Intake</text>

    <rect x="155" y="0" width="140" height="32" rx="16" fill="#ffffff" opacity="0.08"/>
    <text x="225" y="16" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">Instant Qualification</text>

    <rect x="310" y="0" width="140" height="32" rx="16" fill="#ffffff" opacity="0.08"/>
    <text x="380" y="16" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="500" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">CRM Sync Ready</text>
  </g>

  <!-- URL -->
  <text x="260" y="400" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="400" fill="#64748b" letter-spacing="4">LEXIFLOW.CO</text>

  <!-- Bottom left tagline -->
  <text x="60" y="560" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" fill="#475569" letter-spacing="1.5">CAPTURE. QUALIFY. WIN.</text>

  <!-- Brand mark bottom right -->
  <g transform="translate(950, 520)">
    <line x1="0" y1="12" x2="60" y2="12" stroke="#2563eb" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="0" y1="19" x2="40" y2="19" stroke="#6366f1" stroke-width="2" stroke-linecap="round" opacity="0.15"/>
  </g>
</svg>