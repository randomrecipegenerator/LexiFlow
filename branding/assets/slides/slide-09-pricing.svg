    <line x1="0" y1="144" x2="1000" y2="144" stroke="#334155" stroke-width="1"/>
    <text x="30" y="166" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">Lead Scoring &amp; Dashboard</text>
    <text x="380" y="166" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>
    <text x="620" y="166" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>
    <text x="860" y="166" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>

    <!-- Row 4 -->
    <line x1="0" y1="188" x2="1000" y2="188" stroke="#334155" stroke-width="1"/>
    <text x="30" y="210" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">Voice AI Receptionist</text>
    <text x="380" y="210" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">—</text>
    <text x="620" y="210" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>
    <text x="860" y="210" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>

    <!-- Row 5 -->
    <line x1="0" y1="232" x2="1000" y2="232" stroke="#334155" stroke-width="1"/>
    <text x="30" y="254" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">Smart Email Intake</text>
    <text x="380" y="254" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">—</text>
    <text x="620" y="254" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>
    <text x="860" y="254" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>

    <!-- Row 6 -->
    <line x1="0" y1="276" x2="1000" y2="276" stroke="#334155" stroke-width="1"/>
    <text x="30" y="298" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">CRM Sync (Clio / Filevine)</text>
    <text x="380" y="298" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">—</text>
    <text x="620" y="298" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>
    <text x="860" y="298" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓</text>

    <!-- Row 7 -->
    <line x1="0" y1="320" x2="1000" y2="320" stroke="#334155" stroke-width="1"/>
    <text x="30" y="342" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">Multi-User Access</text>
    <text x="380" y="342" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">1 user</text>
    <text x="620" y="342" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">5 users</text>
    <text x="860" y="342" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">Unlimited</text>

    <!-- Highlight litigator column -->
    <rect x="480" y="-2" width="280" height="358" rx="8" fill="none" stroke="#2563eb" stroke-width="2"/>
