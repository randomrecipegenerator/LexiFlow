<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" rx="16" fill="url(#bgGrad)"/>
  <circle cx="200" cy="600" r="250" fill="#2563eb" opacity="0.03"/>
  <circle cx="1000" cy="100" r="200" fill="#6366f1" opacity="0.04"/>
  <g opacity="0.03">
    <line x1="0" y1="135" x2="1200" y2="135" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="405" x2="1200" y2="405" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Header -->
  <text x="600" y="80" font-family="'Inter', system-ui, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">Simple, Transparent Pricing</text>
  <text x="600" y="116" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="middle">One platform. Three tiers. Start free, scale as you grow.</text>

