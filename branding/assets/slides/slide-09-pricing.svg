    <text x="380" y="28" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">Starter</text>
    <text x="620" y="28" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">Litigator <tspan fill="#60a5fa" font-size="10">(Popular)</tspan></text>
    <text x="860" y="28" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">Enterprise</text>

    <!-- Row 1 -->
    <line x1="0" y1="56" x2="1000" y2="56" stroke="#334155" stroke-width="1"/>
    <text x="30" y="78" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">Monthly Price</text>
    <text x="380" y="78" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Free</text>
    <text x="620" y="78" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="800" fill="#60a5fa" text-anchor="middle">$39/mo</text>
    <text x="860" y="78" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Custom</text>

    <!-- Row 2 -->
    <line x1="0" y1="100" x2="1000" y2="100" stroke="#334155" stroke-width="1"/>
    <text x="30" y="122" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#e2e8f0">AI Intake Agent</text>
    <text x="380" y="122" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓ 50 leads/mo</text>
    <text x="620" y="122" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓ Unlimited</text>
    <text x="860" y="122" font-family="'Inter', system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="middle">✓ Unlimited</text>

