  <!-- Bottom CTA -->
  <g transform="translate(100, 540)">
    <rect x="0" y="0" width="1000" height="64" rx="10" fill="url(#accent)" opacity="0.1"/>
    <text x="360" y="30" font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="600" fill="#60a5fa" text-anchor="middle">🚀 All plans include a 14-day free trial. No credit card required.</text>
    <text x="360" y="50" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle">Volume discounts available for firms with 10+ attorneys.</text>
    <rect x="720" y="10" width="220" height="44" rx="22" fill="url(#accent)"/>
    <text x="830" y="32" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">Start Free Trial →</text>
  </g>
</svg>