  <line x1="45" y1="52" x2="65" y2="52" stroke="#bfdbfe" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="62" x2="72" y2="62" stroke="#bfdbfe" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="45" y1="72" x2="58" y2="72" stroke="#bfdbfe" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Grow arrow -->
  <path d="M78 46 L96 28 L96 40 M96 28 L84 28"
