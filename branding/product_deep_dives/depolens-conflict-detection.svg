<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>
  <rect x="0" y="0" width="800" height="52" rx="16" fill="#1e3a5f"/>
  <rect x="0" y="36" width="800" height="16" fill="#1e3a5f"/>
  <text x="400" y="32" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">🔍 Veritas Deposition™ — Cross-Transcript Conflict Detection</text>
  <!-- Case banner -->
  <g transform="translate(24, 70)">
    <rect x="0" y="0" width="752" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="16" y="24" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0">CASE: Boeing 737 MAX Crash — Flight 302</text>
    <text x="360" y="24" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">4 depositions uploaded</text>
    <text x="560" y="24" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">2 conflicts detected</text>
  </g>

  <!-- Split transcript view -->
  <g transform="translate(24, 120)">
    <!-- Left: Pilot transcript excerpt -->
    <rect x="0" y="0" width="365" height="260" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="365" height="36" rx="10" fill="#0f172a"/>
    <text x="182" y="24" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Witness A — Pilot</text>
    <line x1="0" y1="36" x2="365" y2="36" stroke="#334155" stroke-width="1"/>
    <g transform="translate(12, 52)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Q: What was the altitude when the engine failed?</text>
      <text x="0" y="22" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: The left engine failed at approximately</text>
      <text x="0" y="38" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">3,000 feet. I saw flames on the port side.</text>
      <text x="0" y="60" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Q: Did both engines work at takeoff?</text>
      <text x="0" y="82" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: Yes, both were normal at takeoff.</text>
      <text x="0" y="104" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Q: Did you declare an emergency?</text>
      <text x="0" y="126" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: Yes, immediately. I declared mayday.</text>
    </g>
  </g>

  <!-- Right: Engineer transcript -->
  <g transform="translate(411, 120)">
    <rect x="0" y="0" width="365" height="260" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="365" height="36" rx="10" fill="#0f172a"/>
    <text x="182" y="24" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Witness B — Engineer</text>
    <line x1="0" y1="36" x2="365" y2="36" stroke="#334155" stroke-width="1"/>
    <g transform="translate(12, 52)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Q: Engine status during initial climb?</text>
      <text x="0" y="22" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: Both engines were fully operational.</text>
      <text x="0" y="38" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">The failure occurred closer to 2,000 feet.</text>
      <text x="0" y="60" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Q: Were there visible flames?</text>
      <text x="0" y="82" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: No visible flames. Data shows a</text>
      <text x="0" y="98" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">gradual temperature increase.</text>
      <text x="0" y="120" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b">Q: Was a mayday called?</text>
      <text x="0" y="142" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: I don't recall hearing a mayday call.</text>
    </g>
  </g>

  <!-- Connector with conflict indicators -->
  <g transform="translate(389, 220)">
    <circle cx="22" cy="20" r="16" fill="#ef4444"/>
    <text x="22" y="20" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="central">!</text>
  </g>

  <!-- Bottom: Conflict Summary -->
  <g transform="translate(24, 400)">
    <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#ef4444">⚠ 2 CONFLICTS DETECTED</text>
    <g transform="translate(0, 14)">
      <rect x="0" y="0" width="365" height="44" rx="8" fill="#dc2626" opacity="0.12" stroke="#ef4444" stroke-width="0.5"/>
      <text x="16" y="20" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444">Conflict #1: Engine Failure Altitude</text>
      <text x="16" y="36" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#fca5a5">Witness A: 3,000ft ↔ Witness B: 2,000ft</text>
      <rect x="385" y="0" width="365" height="44" rx="8" fill="#dc2626" opacity="0.12" stroke="#ef4444" stroke-width="0.5"/>
      <text x="401" y="20" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444">Conflict #2: Visual Flame Evidence</text>
      <text x="401" y="36" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#fca5a5">Witness A: "saw flames" ↔ Witness B: "no visible flames"</text>
    </g>
  </g>
</svg>