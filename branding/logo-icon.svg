<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background bubble -->
  <rect x="2" y="2" width="116" height="116" rx="24" fill="url(#iconGrad)" opacity="0.06"/>

  <!-- Scale beam -->
  <line x1="15" y1="60" x2="105" y2="60" stroke="url(#iconGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Scale pivot (fulcrum) -->
  <polygon points="55,82 65,82 60,60" fill="url(#iconGrad)" opacity="0.95"/>

  <!-- Left pan -->
  <path d="M15 60 Q10 75 5 78 Q15 82 25 78 Q20 75 15 60Z" fill="url(#iconGrad)" opacity="0.9"/>

  <!-- Right pan - flowing upward (AI asymmetry) -->
  <path d="M105 60 Q110 48 115 45 Q105 42 95 45 Q100 48 105 60Z" fill="url(#iconGrad)" opacity="0.9"/>

  <!-- Data flow dots -->
  <circle cx="100" cy="49" r="3" fill="#818cf8" opacity="0.9"/>
  <circle cx="108" cy="45" r="3.5" fill="#818cf8" opacity="0.6"/>
  <circle cx="114" cy="48" r="2.5" fill="#818cf8" opacity="0.4"/>

  <!-- Signal arcs -->
  <path d="M90 38 Q96 32 102 38" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M94 30 Q100 24 106 30" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Pulse rings -->
  <circle cx="72" cy="60" r="6" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.25"/>
  <circle cx="72" cy="60" r="11" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.12"/>
</svg>