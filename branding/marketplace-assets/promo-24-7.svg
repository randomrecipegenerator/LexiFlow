<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle pattern -->
  <g opacity="0.03">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="200" cy="500" r="200" fill="#2563eb" opacity="0.05"/>
  <circle cx="1000" cy="150" r="180" fill="#6366f1" opacity="0.04"/>

  <!-- === LEFT: Main Content === -->
  <g transform="translate(80, 0)">
    <!-- Headline -->
    <text x="0" y="220" font-family="'Inter', system-ui, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-2">24/7 <tspan fill="url(#accentGrad)">AI Receptionist</tspan></text>
    <text x="0" y="290" font-family="'Inter', system-ui, sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="-2">+ <tspan fill="url(#greenGrad)">Smart Email Intake</tspan></text>

    <!-- Descriptive line -->
    <text x="0" y="360" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="300" fill="#94a3b8">Never miss a lead. Voice calls, emails, and web forms —</text>
    <text x="0" y="392" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="300" fill="#94a3b8">all qualified by LexiFlow's Reasoning AI. Automatically.</text>

    <!-- Feature pills row -->
    <g transform="translate(0, 440)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="80" y="20" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">🤖 Reasoning AI</text>

      <rect x="175" y="0" width="160" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="255" y="20" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">🎙️ Voice Intake</text>

      <rect x="350" y="0" width="160" height="40" rx="20" fill="#ffffff" opacity="0.08"/>
      <text x="430" y="20" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#93c5fd" text-anchor="middle" dominant-baseline="central">📧 Email Parsing</text>
    </g>
  </g>

  <!-- === RIGHT: Visual === -->
  <g transform="translate(640, 80)">
    <!-- Big phone mockup -->
    <rect x="20" y="20" width="160" height="280" rx="24" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- Screen -->
    <rect x="32" y="32" width="136" height="256" rx="16" fill="#0f172a"/>
    <!-- Status bar -->
    <text x="100" y="48" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle">LexiFlow Technologies Inc</text>
    <!-- Chat bubble 1 -->
    <rect x="40" y="60" width="100" height="24" rx="12" fill="#2563eb" opacity="0.2"/>
    <text x="50" y="76" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#93c5fd">How can I help you?</text>
    <!-- Chat bubble 2 -->
    <rect x="52" y="92" width="108" height="24" rx="12" fill="#16a34a" opacity="0.2"/>
    <text x="62" y="108" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#16a34a">I was in a car accident...</text>
    <!-- Chat bubble 3 -->
    <rect x="40" y="124" width="120" height="40" rx="12" fill="#2563eb" opacity="0.2"/>
    <text x="50" y="140" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#93c5fd">I'm sorry to hear that.</text>
    <text x="50" y="154" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#93c5fd">Let me ask a few questions.</text>
    <!-- Mic icon at bottom -->
    <rect x="82" y="260" width="36" height="36" rx="18" fill="#2563eb"/>
    <text x="100" y="278" font-family="'Inter', system-ui, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" dominant-baseline="central">🎤</text>

    <!-- Email icon next to phone -->
    <g transform="translate(230, 60)">
      <rect x="0" y="0" width="160" height="200" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
      <rect x="12" y="12" width="136" height="176" rx="10" fill="#0f172a"/>
      <text x="80" y="36" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="600" fill="#e2e8f0" text-anchor="middle">📧 New Intake Email</text>
      <line x1="16" y1="50" x2="144" y2="50" stroke="#334155" stroke-width="1"/>
      <text x="20" y="72" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#64748b">From:</text>
      <text x="60" y="72" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1">james@email.com</text>
      <text x="20" y="92" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500" fill="#64748b">Subject:</text>
      <text x="60" y="92" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1">Boeing crash inquiry</text>
      <text x="20" y="116" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#94a3b8">AI Analysis:</text>
      <rect x="20" y="126" width="120" height="20" rx="6" fill="#16a34a" opacity="0.15"/>
      <text x="30" y="139" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#16a34a">Qualified: Score 91</text>
      <rect x="20" y="152" width="120" height="20" rx="6" fill="#2563eb" opacity="0.15"/>
      <text x="30" y="165" font-family="'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#60a5fa">Mass Tort - Boeing</text>
    </g>
  </g>

  <!-- Bottom CTA -->
  <g transform="translate(600, 580)">
    <rect x="-120" y="0" width="240" height="36" rx="18" fill="url(#accentGrad)"/>
    <text x="0" y="18" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">Available on cto.new Marketplace</text>
  </g>
</svg>