<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)" stroke="#334155" stroke-width="1"/>
  <!-- Top label -->
  <rect x="24" y="20" width="220" height="32" rx="8" fill="#0891b2" opacity="0.15"/>
  <text x="134" y="36" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="700" fill="#06b6d4" text-anchor="middle" dominant-baseline="central">Veritas Deposition™ — Deposition Conflict Analysis</text>
  <!-- Transcript A (Left) -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="350" height="370" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="350" height="40" rx="10" fill="#0f172a"/>
    <text x="175" y="24" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#e2e8f0" text-anchor="middle">📄 Witness A — Pilot Deposition</text>
    <line x1="0" y1="40" x2="350" y2="40" stroke="#334155" stroke-width="1"/>
    <g transform="translate(16, 56)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Q: What was the aircraft's altitude when</text>
      <text x="0" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">    you noticed the engine issue?</text>
      <text x="0" y="40" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: The left engine failed at approximately</text>
      <text x="0" y="56" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">3,000 feet during initial climb. I saw</text>
      <text x="0" y="72" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">flames from the port side.</text>
      <text x="0" y="96" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Q: Did both engines appear operational</text>
      <text x="0" y="112" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">    before the incident?</text>
      <text x="0" y="136" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: Yes, both were running normally at</text>
      <text x="0" y="152" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">takeoff. The failure happened abruptly.</text>
      <text x="0" y="176" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Q: What was your altitude at takeoff?</text>
      <text x="0" y="192" font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">    Did you issue a mayday?</text>
      <text x="0" y="216" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">A: We were at 3,000 feet. I immediately</text>
      <text x="0" y="232" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#cbd5e1" font-style="italic">declared an emergency.</text>
    </g>
  </g>
  <!-- Timeline (Center) -->
  <g transform="translate(395, 80)">
    <rect x="0" y="0" width="180" height="370" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="90" y="24" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">📅 Timeline</text>
    <line x1="0" y1="40" x2="180" y2="40" stroke="#334155" stroke-width="1"/>
    <!-- Timeline line -->
    <line x1="40" y1="60" x2="40" y2="340" stroke="#475569" stroke-width="2"/>
    <!-- Event 1 -->
    <circle cx="40" cy="80" r="6" fill="#2563eb"/>
    <text x="60" y="84" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#cbd5e1">14:02 Engine vibration</text>
    <!-- Event 2 -->
    <circle cx="40" cy="130" r="6" fill="#2563eb"/>
    <text x="60" y="134" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#cbd5e1">14:05 Altitude 3,000ft</text>
    <!-- Event 3 - Conflict! -->
    <circle cx="40" cy="180" r="6" fill="#ef4444"/>
    <rect x="56" y="170" width="110" height="24" rx="6" fill="#dc2626" opacity="0.2"/>
    <text x="68" y="186" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">⚠ CONFLICT</text>
    <text x="60" y="206" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#94a3b8">Engine status disputed</text>
    <!-- Event 4 -->
    <circle cx="40" cy="240" r="6" fill="#2563eb"/>
    <text x="60" y="244" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#cbd5e1">14:07 Mayday called</text>
    <!-- Event 5 -->
    <circle cx="40" cy="290" r="6" fill="#2563eb"/>
    <text x="60" y="294" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#cbd5e1">14:10 Emergency landing</text>
  </g>
  <!-- Transcript B (Right) -->
  <g transform="translate(590, 80)">
    <rect x="0" y="0" width="180" height="370" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="0" y="0" width="180" height="40" rx="10" fill="#0f172a"/>
    <text x="90" y="24" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#e2e8f0" text-anchor="middle">Witness B — Engineer</text>
    <line x1="0" y1="40" x2="180" y2="40" stroke="#334155" stroke-width="1"/>
    <g transform="translate(12, 56)">
      <text x="0" y="0" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="#94a3b8">Q: Engine status at 3,000ft?</text>
      <text x="0" y="20" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#cbd5e1" font-style="italic">A: Both engines were fully</text>
      <text x="0" y="34" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#cbd5e1" font-style="italic">operational. The failure</text>
      <text x="0" y="48" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#cbd5e1" font-style="italic">occurred at 2,000 feet.</text>
      <text x="0" y="72" font-family="'Inter', system-ui, sans-serif" font-size="8" font-weight="600" fill="#94a3b8">Q: Any flames before impact?</text>
      <text x="0" y="92" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#cbd5e1" font-style="italic">A: No visible flames. Engine</text>
      <text x="0" y="106" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#cbd5e1" font-style="italic">data shows gradual temp rise.</text>
    </g>
  </g>
  <!-- Conflict summary bar at bottom -->
  <g transform="translate(30, 470)">
    <rect x="0" y="-20" width="740" height="36" rx="8" fill="#dc2626" opacity="0.12" stroke="#ef4444" stroke-width="0.5"/>
    <circle cx="20" cy="-2" r="5" fill="#ef4444"/>
    <text x="34" y="2" font-family="'Inter', system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef4444">2 CONFLICTS DETECTED:</text>
    <text x="190" y="2" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#fca5a5">① Altitude of failure (3,000ft vs 2,000ft)</text>
    <text x="520" y="2" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#fca5a5">② Visual flame evidence (seen vs not seen)</text>
  </g>
</svg>